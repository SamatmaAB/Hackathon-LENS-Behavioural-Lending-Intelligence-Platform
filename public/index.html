<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LENS — Behavioural Lending Intelligence Platform</title>
<meta name="description" content="LENS — AI-powered behavioural lending intelligence for relationship managers. Real-time lead scoring, income reconstruction, and explainable AI signals." />
<meta name="theme-color" content="#070B14">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
:root{
  --bg:#070B14;
  --surface:#0F1626;
  --surface-2:#151E33;
  --surface-3:#1B2640;
  --border:#222F4A;
  --border-soft:#1A2438;
  --teal:#16C2AE;
  --teal-dim:#0E7A6E;
  --amber:#F2870C;
  --amber-dim:#9C5B0A;
  --red:#E5484D;
  --green:#22C55E;
  --text-hi:#EDF2F9;
  --text-mid:#A9B5CB;
  --text-low:#5C6B87;
  --tier1:#F2870C;
  --tier2:#16C2AE;
  --tier3:#5C6B87;
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text-hi);font-family:var(--font-body);}
body{
  background-image:
    radial-gradient(circle at 15% 0%, rgba(22,194,174,0.07), transparent 40%),
    radial-gradient(circle at 90% 10%, rgba(242,135,12,0.05), transparent 35%);
}
#root{min-height:100vh;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:var(--teal-dim);}

.app{display:grid;grid-template-columns:72px 1fr;min-height:100vh;}

/* ---------- Sidebar ---------- */
.sidebar{
  background:var(--surface);border-right:1px solid var(--border-soft);
  display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:4px;
  position:sticky;top:0;height:100vh;
}
.brand-mark{width:36px;height:36px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.nav-icon{
  width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  color:var(--text-low);cursor:pointer;transition:all .15s ease;position:relative;
}
.nav-icon.active{background:rgba(22,194,174,0.12);color:var(--teal);}
.nav-icon:hover:not(.active){color:var(--text-hi);background:rgba(255,255,255,0.04);}
.nav-tooltip{
  position:absolute;left:calc(100% + 10px);background:var(--surface-2);border:1px solid var(--border);
  border-radius:7px;padding:5px 10px;font-size:11px;font-weight:600;color:var(--text-hi);
  white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:100;
}
.nav-icon:hover .nav-tooltip{opacity:1;}
.sidebar-spacer{flex:1;}
.sidebar-foot{color:var(--text-low);font-size:10px;writing-mode:vertical-rl;letter-spacing:1px;margin-bottom:8px;}

/* ---------- Main ---------- */
.main{display:flex;flex-direction:column;min-height:100vh;overflow:hidden;}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:22px 32px 14px 32px;border-bottom:1px solid var(--border-soft);
  flex-wrap:wrap;gap:16px;
}
.topbar h1{
  font-family:var(--font-display);font-size:22px;font-weight:600;margin:0;
  display:flex;align-items:center;gap:10px;letter-spacing:.2px;
}
.topbar .sub{color:var(--text-mid);font-size:13px;margin-top:3px;}
.topbar-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

.btn{
  font-family:var(--font-body);font-weight:600;font-size:13px;border:1px solid var(--border);
  background:var(--surface-2);color:var(--text-hi);padding:9px 16px;border-radius:9px;
  cursor:pointer;transition:all .15s ease;display:inline-flex;align-items:center;gap:7px;
}
.btn:hover{border-color:var(--teal-dim);background:var(--surface-3);}
.btn.primary{background:linear-gradient(135deg,var(--teal),var(--teal-dim));border:none;color:#04141F;}
.btn.primary:hover{filter:brightness(1.08);}
.btn.danger{border-color:rgba(229,72,77,0.4);color:var(--red);}
.btn.danger:hover{background:rgba(229,72,77,0.1);border-color:var(--red);}
.btn:disabled{opacity:.5;cursor:not-allowed;pointer-events:none;}

/* ---------- KPI strip ---------- */
.kpi-strip{
  display:grid;grid-template-columns:repeat(5,1fr);gap:1px;
  background:var(--border-soft);border-bottom:1px solid var(--border-soft);
}
.kpi{
  background:var(--surface);padding:18px 22px;position:relative;overflow:hidden;
}
.kpi .label{font-size:11px;color:var(--text-low);text-transform:uppercase;letter-spacing:.6px;font-weight:600;}
.kpi .value{font-family:var(--font-display);font-size:26px;font-weight:700;margin-top:6px;color:var(--text-hi);}
.kpi .bench{font-size:11px;color:var(--text-low);margin-top:4px;}
.kpi .bench b{color:var(--teal);font-weight:600;}
.kpi-pulse{position:absolute;bottom:0;left:0;right:0;height:26px;opacity:.55;}

/* ---------- Body layout ---------- */
.body-grid{flex:1;display:grid;grid-template-columns:minmax(360px,440px) 1fr;overflow:hidden;}

.queue{display:flex;flex-direction:column;border-right:1px solid var(--border-soft);overflow:hidden;}
.queue-controls{padding:16px 18px 12px;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid var(--border-soft);}
.search-box{
  display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);
  border-radius:9px;padding:8px 12px;
}
.search-box input{
  background:transparent;border:none;outline:none;color:var(--text-hi);font-size:13px;width:100%;font-family:var(--font-body);
}
.search-box input::placeholder{color:var(--text-low);}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;}
.chip{
  font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;border:1px solid var(--border);
  color:var(--text-mid);cursor:pointer;background:var(--surface-2);transition:all .15s;
}
.chip.active{background:rgba(22,194,174,0.14);border-color:var(--teal-dim);color:var(--teal);}
.chip:hover{color:var(--text-hi);}

.queue-list{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}

.lead-card{
  background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:14px 14px 12px;
  cursor:pointer;transition:all .15s ease;position:relative;
}
.lead-card:hover{border-color:var(--teal-dim);transform:translateY(-1px);}
.lead-card.selected{border-color:var(--teal);background:var(--surface-2);box-shadow:0 0 0 1px var(--teal) inset;}
.lead-card-top{display:flex;justify-content:space-between;align-items:flex-start;}
.lead-name{font-weight:600;font-size:14px;color:var(--text-hi);}
.lead-meta{font-size:11.5px;color:var(--text-low);margin-top:2px;font-family:var(--font-mono);}
.tier-badge{
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.4px;white-space:nowrap;
}
.tier-badge.t1{background:rgba(242,135,12,0.16);color:var(--tier1);}
.tier-badge.t2{background:rgba(22,194,174,0.16);color:var(--tier2);}
.tier-badge.t3{background:rgba(92,107,135,0.2);color:#8C9AB5;}

.lead-card-mid{display:flex;align-items:center;gap:10px;margin-top:10px;}
.pulse-mini{flex:1;height:26px;}
.trust-pill{
  font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--teal);
  background:rgba(22,194,174,0.08);border:1px solid var(--border);border-radius:7px;padding:3px 8px;white-space:nowrap;
}
.lead-card-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.loan-chip{
  font-size:11px;font-weight:600;color:var(--text-mid);background:var(--surface-3);
  padding:4px 9px;border-radius:6px;border:1px solid var(--border-soft);
}
.window-tag{font-size:11px;color:var(--text-low);font-family:var(--font-mono);}

/* ---------- Detail panel ---------- */
.detail{overflow-y:auto;padding:28px 36px 60px;}
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;
  color:var(--text-low);gap:14px;padding-top:120px;
}
.empty-state svg{opacity:.4;}
.empty-state .t{font-family:var(--font-display);font-size:16px;color:var(--text-mid);}
.empty-state .s{font-size:13px;max-width:320px;text-align:center;line-height:1.5;}

.detail-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;}
.detail-head h2{font-family:var(--font-display);font-size:24px;margin:0 0 4px;}
.detail-sub{color:var(--text-mid);font-size:13px;font-family:var(--font-mono);}
.score-ring-wrap{display:flex;gap:18px;align-items:center;}

.section-title{
  font-family:var(--font-display);font-size:13px;text-transform:uppercase;letter-spacing:1px;
  color:var(--text-mid);margin:32px 0 14px;display:flex;align-items:center;gap:8px;
}
.section-title .dot{width:6px;height:6px;border-radius:50%;background:var(--teal);}

.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.metric-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:11px;padding:16px;}
.metric-card .l{font-size:11px;color:var(--text-low);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.metric-card .v{font-family:var(--font-display);font-size:20px;margin-top:6px;}
.metric-card .d{font-size:11.5px;color:var(--text-low);margin-top:4px;}

.trigger-list{display:flex;flex-direction:column;gap:8px;}
.trigger-row{
  display:grid;grid-template-columns:1fr 100px 90px;align-items:center;gap:12px;
  background:var(--surface);border:1px solid var(--border-soft);border-radius:9px;padding:10px 14px;
}
.trigger-row .name{font-size:13px;color:var(--text-hi);}
.trigger-bar-track{height:6px;background:var(--surface-3);border-radius:3px;overflow:hidden;}
.trigger-bar-fill{height:100%;background:linear-gradient(90deg,var(--teal-dim),var(--teal));border-radius:3px;}
.trigger-row .w{font-family:var(--font-mono);font-size:12px;color:var(--text-mid);text-align:right;}

.income-panel{
  background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:20px;
  display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center;
}
.income-figure .big{font-family:var(--font-display);font-size:30px;font-weight:700;}
.income-figure .lbl{font-size:11px;color:var(--text-low);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.income-method{font-size:12.5px;color:var(--text-mid);margin-top:8px;line-height:1.5;}
.income-bars{display:flex;flex-direction:column;gap:10px;}
.income-bar-row{display:flex;align-items:center;gap:10px;}
.income-bar-row .ib-label{width:90px;font-size:11.5px;color:var(--text-low);}
.income-bar-track{flex:1;height:18px;background:var(--surface-3);border-radius:5px;overflow:hidden;position:relative;}
.income-bar-fill{height:100%;border-radius:5px;}
.income-bar-row .ib-val{font-family:var(--font-mono);font-size:11.5px;color:var(--text-mid);width:78px;text-align:right;}

.outreach-card{
  background:linear-gradient(135deg,rgba(242,135,12,0.08),rgba(22,194,174,0.05));
  border:1px solid var(--border);border-radius:12px;padding:18px 20px;display:flex;justify-content:space-between;
  align-items:center;flex-wrap:wrap;gap:14px;
}
.outreach-card .chan{font-family:var(--font-display);font-size:18px;font-weight:600;}
.outreach-card .window{font-size:12.5px;color:var(--text-mid);margin-top:4px;font-family:var(--font-mono);}

.txn-table{width:100%;border-collapse:collapse;margin-top:4px;}
.txn-table th{
  text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-low);
  padding:8px 12px;border-bottom:1px solid var(--border-soft);font-weight:600;
}
.txn-table td{padding:9px 12px;font-size:12.5px;border-bottom:1px solid var(--border-soft);color:var(--text-mid);}
.txn-table tr:last-child td{border-bottom:none;}
.txn-table tr:hover td{background:var(--surface);}
.txn-table .amt{font-family:var(--font-mono);color:var(--text-hi);}
.txn-type-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:var(--surface-3);color:var(--text-mid);}

.loading-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:18px;color:var(--text-mid);
}
.spinner{
  width:34px;height:34px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--teal);
  animation:spin 0.9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.error-banner{
  margin:18px 32px 0;padding:14px 18px;background:rgba(229,72,77,0.08);border:1px solid rgba(229,72,77,0.35);
  border-radius:10px;color:#F2A0A2;font-size:13px;line-height:1.6;
}
.error-banner code{background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:4px;font-family:var(--font-mono);}

/* ---------- Tabs ---------- */
.tab-bar{
  display:flex;border-bottom:1px solid var(--border-soft);padding:0 32px;gap:0;
}
.tab-btn{
  font-family:var(--font-body);font-size:13px;font-weight:600;padding:14px 20px;
  background:transparent;border:none;color:var(--text-low);cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px;
}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal);}
.tab-btn:hover:not(.active){color:var(--text-mid);}

/* ---------- Governance panels ---------- */
.gov-section{padding:28px 36px 60px;}
.gov-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px;}
.gov-card{
  background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:20px;
  display:flex;flex-direction:column;gap:8px;
}
.gov-card .gc-label{font-size:11px;color:var(--text-low);text-transform:uppercase;letter-spacing:.6px;font-weight:600;}
.gov-card .gc-value{font-family:var(--font-display);font-size:28px;font-weight:700;}
.gov-card .gc-sub{font-size:12px;color:var(--text-mid);line-height:1.4;}
.status-pill{
  display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:20px;letter-spacing:.3px;
}
.status-pill.compliant{background:rgba(22,197,94,0.12);color:var(--green);}
.status-pill.review{background:rgba(242,135,12,0.12);color:var(--amber);}
.status-pill.flag{background:rgba(229,72,77,0.12);color:var(--red);}

.segment-table{width:100%;border-collapse:collapse;margin-top:8px;}
.segment-table th{
  text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-low);
  padding:8px 12px;border-bottom:1px solid var(--border-soft);font-weight:600;
}
.segment-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border-soft);color:var(--text-mid);}
.segment-table tr:last-child td{border-bottom:none;}

/* ---------- Admin panel ---------- */
.admin-section{padding:28px 36px 60px;}
.admin-grid{display:grid;gap:16px;margin-top:16px;}
.admin-user-card{
  background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;
  padding:16px 20px;display:flex;align-items:center;gap:16px;
}
.admin-user-avatar{
  width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:700;font-size:15px;flex-shrink:0;
}
.admin-user-avatar.role-admin{background:rgba(242,135,12,0.15);color:var(--amber);}
.admin-user-avatar.role-rm{background:rgba(22,194,174,0.15);color:var(--teal);}
.admin-user-avatar.role-analyst{background:rgba(92,107,135,0.2);color:#8C9AB5;}
.admin-user-info{flex:1;}
.admin-user-name{font-weight:600;font-size:14px;}
.admin-user-meta{font-size:12px;color:var(--text-low);font-family:var(--font-mono);margin-top:2px;}
.role-tag{
  font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:.3px;
}
.role-tag.admin{background:rgba(242,135,12,0.16);color:var(--amber);}
.role-tag.relationship_manager{background:rgba(22,194,174,0.16);color:var(--teal);}
.role-tag.analyst{background:rgba(92,107,135,0.2);color:#8C9AB5;}

/* ---------- Visual Enhancements (Trust, KPI, Reasoning, Scan) ---------- */
.reasoning-flow {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 10px 0;
}
.flow-step {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface-2);
  border: 1px solid var(--border-soft);
  border-radius: 10px;
  padding: 10px 14px;
}
.flow-icon {
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: var(--surface-3);
}
.flow-label {
  font-size: 10px;
  color: var(--text-low);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
}
.flow-value {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text-hi);
  margin-top: 2px;
}
.flow-arrow {
  text-align: center;
  color: var(--text-low);
  font-size: 12px;
  line-height: 1;
  margin: 2px 0;
}
.live-scan {
  background: #060913;
  border: 1px solid var(--border);
  color: var(--teal);
  font-family: var(--font-mono);
  padding: 20px;
  border-radius: 12px;
  font-size: 12.5px;
  max-width: 550px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.scan-line {
  padding: 4px 0;
  opacity: 0;
  animation: fadeIn 0.3s forwards;
}
.scan-line.done {
  color: var(--teal);
}
.scan-line.active {
  color: var(--amber);
  font-weight: bold;
}
.roi-legend {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.roi-legend .dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
}
@keyframes fadeIn {
  to { opacity: 1; }
}

/* ---------- Printing & Compare Styles ---------- */
.lead-tree {
  font-family: var(--font-body);
}
#lens-printable-report {
  display: none;
}
.dashboard-bg {
  background: linear-gradient(120deg, var(--surface) 0%, var(--surface-2) 100%) !important;
  background-size: 200% 200%;
  animation: subtleShift 18s ease infinite;
}
@keyframes subtleShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@media print {
  body * {
    visibility: hidden;
  }
  #lens-printable-report, #lens-printable-report * {
    visibility: visible;
  }
  #lens-printable-report {
    display: block !important;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    background: #ffffff !important;
    color: #111827 !important;
    padding: 20px;
    font-family: var(--font-body);
  }
}

.compare-grid {
  display: grid;
  grid-template-columns: 1fr 180px 1fr;
  gap: 12px 24px;
  align-items: center;
}
.compare-head {
  font-family: var(--font-display);
  font-size: 15px;
  text-align: center;
  padding: 12px;
}
.compare-head.center {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.compare-cell {
  background: var(--surface-2);
  border: 1px solid var(--border-soft);
  border-radius: 8px;
  padding: 10px 16px;
  text-align: center;
  font-size: 13.5px;
  transition: all 0.2s ease;
}
.compare-cell.win {
  border-color: var(--teal-dim);
  background: rgba(22, 194, 174, 0.08);
  color: var(--teal);
  font-weight: 600;
}
.compare-label {
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-low);
  text-transform: uppercase;
  letter-spacing: .5px;
}

/* ---------- Auth UI ---------- */
.auth-container {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  background: var(--bg);
  background-image:
    radial-gradient(circle at 50% 30%, rgba(22,194,174,0.12), transparent 50%),

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const {useState, useEffect, useMemo, useCallback, useRef} = React;

const API_BASE = (() => {
  const params = new URLSearchParams(window.location.search);
  if (params.get('api')) return params.get('api');
  if (window.location.port === '5500' || window.location.port === '5501') return 'http://localhost:8000';
  return window.location.origin;
})();
const storageKey = 'lens_auth_v2';
const emptyCustomer = {
  customer_id:'', name:'', age:32, city:'', state:'', employment_type:'Salaried',
  declared_income:'', true_monthly_income:'', true_loan_type:'None', persona:'manual'
};
const emptyTxn = {customer_id:'', type:'SALARY_CREDIT', amount:'', counterparty:'Employer Payroll', timestamp:''};

const TIER_COLORS = {'Tier 1': 'var(--tier1)', 'Tier 2': 'var(--tier2)', 'Tier 3': 'var(--tier3)'};

function fmtINR(n) {
  if (n === null || n === undefined) return '—';
  return '₹' + Number(n).toLocaleString('en-IN', {maximumFractionDigits: 0});
}

function normalize_loan_type(loan_type) {
  if (loan_type === "Mortgage") return "Mortgage Loan";
  return loan_type;
}

function fmtRelTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const diffH = (Date.now() - d.getTime()) / 36e5;
  if (diffH < 1) return Math.round(diffH * 60) + 'm ago';
  if (diffH < 24) return Math.round(diffH) + 'h ago';
  return Math.round(diffH / 24) + 'd ago';
}

function fmtWindowEnd(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const diffH = (d.getTime() - Date.now()) / 36e5;
  if (diffH < 0) return 'window closed';
  return 'closes in ' + Math.max(1, Math.round(diffH)) + 'h';
}

function useCountUp(target, duration = 900, decimals = 0) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let start = null, raf;
    const step = (ts) => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / duration, 1);
      const current = p * target;
      setVal(Number(current.toFixed(decimals)));
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [target, decimals]);
  return val;
}

function KPICard({ label, value, decimals = 0, suffix = "", prefix = "", bench, pulseIndex }) {
  const animated = useCountUp(value, 900, decimals);
  return (
    <div className="kpi" title={label === 'Conversion Rate' ? "% of flagged leads whose ground-truth persona matches genuine loan intent, evaluated against the synthetic labels generated with noise_level=20%" : undefined}>
      <div className="label">{label}</div>
      <div className="value">{prefix}{animated.toLocaleString('en-IN', {minimumFractionDigits: decimals, maximumFractionDigits: decimals})}{suffix}</div>
      <div className="bench">{bench}</div>
      <div className="kpi-pulse">
        <PulseLine intensity={40 + pulseIndex * 11} width={300} height={26} id={'kpi' + pulseIndex} animate={false} />
      </div>
    </div>
  );
}

function TrustGauge({ score, tier, size = 68 }) {
  const angle = -90 + (score / 100) * 180;
  const color = TIER_COLORS[tier] || 'var(--teal)';
  const dash = (score / 100) * 283;
  return (
    <svg viewBox="0 0 200 120" width={size} height={size * 0.65} style={{ display: 'block' }}>
      <path d="M10,110 A90,90 0 0,1 190,110" fill="none" stroke="var(--border-soft)" strokeWidth="16" strokeLinecap="round" />
      <path d="M10,110 A90,90 0 0,1 190,110" fill="none" stroke={color} strokeWidth="16"
            strokeLinecap="round" strokeDasharray={`${dash} 283`} style={{ transition: "stroke-dasharray 0.8s ease" }} />
      <line x1="100" y1="110" x2={100 + 70 * Math.cos(angle * Math.PI / 180)}
            y2={110 + 70 * Math.sin(angle * Math.PI / 180)} stroke="var(--text-hi)" strokeWidth="4" strokeLinecap="round" />
      <circle cx="100" cy="110" r="10" fill="var(--text-hi)" />
      <text x="100" y="65" textAnchor="middle" fontSize="30" fontWeight="700" fill="var(--text-hi)" fontFamily="var(--font-display)">{score}</text>
      <text x="100" y="90" textAnchor="middle" fontSize="15" fontWeight="600" fill="var(--text-mid)" fontFamily="var(--font-body)">{tier}</text>
    </svg>
  );
}

function ReasoningFlow({ customer, lead, income_breakdown, capacity }) {
  const steps = [
    { label: "PULSE — Behavioral Triggers", value: lead.triggers_fired.map(t => t.label).join(" | ") || "No triggers", icon: "⚡" },
    { label: "CLARITY — Income Reconstructed", value: `${fmtINR(income_breakdown?.synthetic_monthly_income)}/mo (${100 - (lead.income_accuracy_pct || 0)}% confidence via ${income_breakdown?.method})`, icon: "💰" },
    { 
      label: "CAPACITY — Underwriting capacity", 
      value: capacity 
        ? `Eligible limit: ${fmtINR(capacity.recommended_eligible_amount)} for ${capacity.recommended_tenure_months} months (DTI: ${(capacity.dti_ratio * 100).toFixed(1)}% · Safe EMI: ${fmtINR(capacity.safe_emi_ceiling)})`
        : "Loading capacity...", 
      icon: "⚖️" 
    },
    { label: "MATCH — Loan Product", value: `${lead.predicted_loan_type} predicted`, icon: "🎯" },
    { label: "MOMENT — Outreach Channel", value: `${lead.outreach_channel} recommended`, icon: "📞" },
    { label: "TRUST SCORE — Credit Quality", value: `${lead.trust_score} / 100 — ${lead.tier} (${lead.tier_action_label || 'Refer to RM'})`, icon: "✅" },
  ];

  return (
    <div className="reasoning-flow">
      {steps.map((s, i) => (
        <React.Fragment key={i}>
          <div className="flow-step">
            <span className="flow-icon">{s.icon}</span>
            <div>
              <div className="flow-label">{s.label}</div>
              <div className="flow-value">{s.value}</div>
            </div>
          </div>
          {i < steps.length - 1 && <div className="flow-arrow">↓</div>}
        </React.Fragment>
      ))}
    </div>
  );
}

function LiveScanAnimation({ active }) {
  const messages = [
    "Connecting to core banking transaction warehouse...",
    "Scanning 90-day transaction history for behavioral patterns...",
    "Detecting credit-intent triggers (PULSE)...",
    "Clustering irregular UPI flows & estimating synthetic income (CLARITY)...",
    "Classifying loan product propensity (MATCH)...",
    "Recommending optimal outreach channels and time windows (MOMENT)...",
    "Calibrating risk-shifted FOIR limits & repayment capacity (CAPACITY)...",
    "Calculating risk-adjusted credit tiers and trust scores (TRUST SCORE)...",
    "Commiting leads and Maker-Checker approval configurations to ledger...",
  ];
  const [idx, setIdx] = useState(0);
  useEffect(() => {
    if (!active) { setIdx(0); return; }
    const id = setInterval(() => setIdx(i => Math.min(i + 1, messages.length - 1)), 600);
    return () => clearInterval(id);
  }, [active]);

  if (!active) return null;
  return (
    <div className="live-scan">
      {messages.slice(0, idx + 1).map((m, i) => (
        <div key={i} className={i === idx ? "scan-line active" : "scan-line done"}>
          {i < idx ? "✓ " : "› "}{m}
        </div>
      ))}
      {idx < messages.length - 1 && (
        <div className="spinner" style={{ width: 20, height: 20, marginTop: 15 }}></div>
      )}
    </div>
  );
}

function FairnessBarChart({ segments }) {
  if (!segments || segments.length === 0) return null;
  const max = Math.max(...segments.map(s => s.conversion_rate_pct), 10);
  return (
    <svg viewBox={`0 0 400 ${segments.length * 40 + 20}`} width="100%" style={{ maxWidth: 450, display: 'block', margin: '0 auto' }}>
      {segments.map((s, i) => (
        <g key={s.segment_name} transform={`translate(0, ${i * 40 + 10})`}>
          <text x="0" y="14" fontSize="12" fill="var(--text-mid)" fontWeight="500">{s.segment_name}</text>
          <rect x="120" y="0" width={(s.conversion_rate_pct / max) * 230} height="18"
                fill={s.is_underperforming ? "var(--red)" : "var(--teal)"} rx="3"
                style={{ transition: "width 0.6s ease" }} />
          <text x={125 + (s.conversion_rate_pct / max) * 230} y="14" fontSize="12" fill="var(--text-hi)" fontWeight="600">{s.conversion_rate_pct}%</text>
          {s.is_underperforming && <text x="370" y="14" fontSize="11" fill="var(--red)">⚠ bias alert</text>}
        </g>
      ))}
    </svg>
  );
}

/* ---------- Illustrative city-level lead concentration map ----------
   NOTE: This is a simplified illustrative scatter projection, not a
   precise cartographic trace of India's borders - coordinates are
   approximate and for visualization only. */
function GeoDistributionMap({ cities }) {
  const mapRef = useRef(null);
  
  useEffect(() => {
    if (!mapRef.current || !window.L || !cities || cities.length === 0) return;
    
    // Clear the container in case React runs useEffect multiple times (strict mode or remounting)
    if (mapRef.current._leaflet_id) {
      mapRef.current._leaflet_id = null;
      mapRef.current.innerHTML = '';
    }
    
    // Initialize map focused on India
    const map = L.map(mapRef.current).setView([22.5937, 78.9629], 4);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      className: 'map-tiles'
    }).addTo(map);

    const maxLeads = Math.max(...cities.map(c => c.lead_count), 1);
    
    const trustColor = (score) => {
      if (score >= 70) return "#2dd4bf";
      if (score >= 45) return "#f59e0b";
      return "#ef4444";
    };

    cities.forEach(c => {
      const radius = 6 + (c.lead_count / maxLeads) * 15;
      const color = trustColor(c.avg_trust_score);
      
      const circle = L.circleMarker([c.lat, c.lng], {
        radius: radius,
        fillColor: color,
        color: '#fff',
        weight: 1.5,
        opacity: 0.9,
        fillOpacity: 0.75
      }).addTo(map);
      
      circle.bindPopup(`<b>${c.city}</b><br>Leads: ${c.lead_count}<br>Avg Trust: ${c.avg_trust_score.toFixed(1)}`, {
        className: 'custom-popup'
      });
    });
    
    return () => {
      map.remove();
    };
  }, [cities]);

  if (!cities || cities.length === 0) {
    return <div className="empty-state">No geographic data yet - generate a dataset first.</div>;
  }

  return (
    <div style={{ textAlign: "center", width: "100%" }}>
      <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-low)",
                    textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 15 }}>
        Lead Concentration by City
      </div>
      
      <div ref={mapRef} style={{ width: '100%', height: '400px', borderRadius: '12px', zIndex: 0, border: '1px solid var(--border)' }}></div>
      
      <div style={{ display: "flex", justifyContent: "center", gap: 16, marginTop: 15, fontSize: 11 }}>
        <span><span style={{ color: "#2dd4bf" }}>{"\u25cf"}</span> Tier 1 avg trust</span>
        <span><span style={{ color: "#f59e0b" }}>{"\u25cf"}</span> Tier 2 avg trust</span>
        <span><span style={{ color: "#ef4444" }}>{"\u25cf"}</span> Tier 3 avg trust</span>
      </div>
      
      <style dangerouslySetInnerHTML={{__html: `
        .map-tiles { filter: brightness(0.9) contrast(1.1) invert(1) hue-rotate(200deg) saturate(0.3) brightness(1.2); }
        .custom-popup .leaflet-popup-content-wrapper { background: var(--surface-2); color: var(--text-hi); border-radius: 8px; border: 1px solid var(--border-soft); }
        .custom-popup .leaflet-popup-tip { background: var(--surface-2); }
      `}} />
    </div>
  );
}

function RoiDonut({ assessmentCost, outreachCost, netProfit }) {
  const total = assessmentCost + outreachCost + (netProfit > 0 ? netProfit : 0);
  const p1 = total > 0 ? (assessmentCost / total) * 100 : 0;
  const p2 = total > 0 ? p1 + (outreachCost / total) * 100 : 0;
  
  const style = {
    background: `conic-gradient(var(--red) 0% ${p1}%, var(--amber) ${p1}% ${p2}%, var(--teal) ${p2}% 100%)`,
    width: 140, height: 140, borderRadius: "50%", position: "relative",
    boxShadow: "0 4px 20px rgba(0,0,0,0.3)",
    display: "flex", alignItems: "center", justifyContent: "center"
  };
  
  const innerCircleStyle = {
    width: "70%", height: "70%", borderRadius: "50%",
    background: "var(--surface-2)", display: "flex", flexDirection: "column",
    alignItems: "center", justifyContent: "center"
  };

  return (
    <div style={{ display: "flex", gap: 32, alignItems: "center", background: "var(--surface)", border: "1px solid var(--border-soft)", borderRadius: 12, padding: "20px 24px" }}>
      <div style={style}>
        <div style={innerCircleStyle}>
          <div style={{ fontSize: 10, color: "var(--text-low)", textTransform: "uppercase", letterSpacing: ".5px" }}>Profit Yield</div>
          <div style={{ fontSize: 16, fontWeight: "bold", color: "var(--teal)" }}>{total > 0 ? ((netProfit / total) * 100).toFixed(0) : 0}%</div>
        </div>
      </div>
      <div className="roi-legend">
        <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: "var(--text-mid)" }}>
          <span className="dot" style={{ background: "var(--red)", width: 10, height: 10, borderRadius: "50%", display: "inline-block" }} /> 
          <b>Assessment Cost:</b> {fmtINR(assessmentCost)}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: "var(--text-mid)" }}>
          <span className="dot" style={{ background: "var(--amber)", width: 10, height: 10, borderRadius: "50%", display: "inline-block" }} /> 
          <b>Outreach Cost:</b> {fmtINR(outreachCost)}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: "var(--text-mid)" }}>
          <span className="dot" style={{ background: "var(--teal)", width: 10, height: 10, borderRadius: "50%", display: "inline-block" }} /> 
          <b>Projected Profit:</b> {fmtINR(netProfit)}
        </div>
      </div>
    </div>
  );
}

function ArchitectureFlow() {
  const stages = [
    { name: "PULSE", desc: "14 behavioural triggers", color: "var(--indigo)" },
    { name: "CLARITY", desc: "Income reconstruction", color: "var(--teal)" },
    { name: "CAPACITY", desc: "DTI & FOIR eligibility", color: "var(--amber)" },
    { name: "MATCH", desc: "Loan type prediction", color: "var(--violet)" },
    { name: "MOMENT", desc: "Outreach timing", color: "var(--teal-dim)" },
    { name: "TRUST SCORE", desc: "Tier 1/2/3", color: "var(--red)" },
  ];
  const boxW = 120, boxH = 65, gap = 20, w = stages.length * (boxW + gap);

  return (
    <div style={{ background: 'var(--surface)', border: '1px solid var(--border-soft)', borderRadius: 16, padding: '18px 24px', marginBottom: 24 }}>
      <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-low)', textTransform: 'uppercase', letterSpacing: '.5px', marginBottom: 12 }}>LENS Behavioural Lending System Architecture Flow</div>
      <svg viewBox={`0 0 ${w} 100`} width="100%" height="80" style={{ maxWidth: 900, display: 'block', margin: '0 auto' }}>
        {stages.map((s, i) => {
          const x = i * (boxW + gap) + 10;
          return (
            <g key={s.name}>
              <rect x={x} y="15" width={boxW} height={boxH} rx="10" fill={s.color} opacity="0.12" stroke={s.color} strokeWidth="1.5" />
              <text x={x + boxW / 2} y="40" textAnchor="middle" fontSize="12" fontWeight="700" fill={s.color} fontFamily="var(--font-display)">{s.name}</text>
              <text x={x + boxW / 2} y="58" textAnchor="middle" fontSize="8" fill="var(--text-mid)" fontFamily="var(--font-body)">{s.desc}</text>
              {i < stages.length - 1 && (
                <path d={`M${x + boxW},45 L${x + boxW + gap - 6},45`} stroke="var(--border)" strokeWidth="2" markerEnd="url(#arrow)" />
              )}
            </g>
          );
        })}
        <defs>
          <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
            <path d="M0,0 L8,4 L0,8 Z" fill="var(--text-low)" />
          </marker>
        </defs>
      </svg>
    </div>
  );
}

function PipelineFunnel({ stages }) {
  if (!stages || stages.length === 0) return null;
  const w = 500, h = 260, barH = 46, gap = 12;
  const max = stages[0].value || 1;

  return (
    <div style={{ background: 'var(--surface-3)', border: '1px solid var(--border-soft)', borderRadius: 12, padding: '16px 20px' }}>
      <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-low)', textTransform: 'uppercase', letterSpacing: '.5px', marginBottom: 12 }}>Lead Generation & Conversion Funnel</div>
      <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} style={{ maxWidth: 440, display: 'block', margin: '0 auto' }}>
        {stages.map((s, i) => {
          const widthPct = s.value / max;
          const barW = widthPct * (w - 160);
          const x = (w - barW) / 2;
          const y = i * (barH + gap) + 10;
          const color = ["var(--indigo)", "var(--teal)", "var(--teal-dim)", "var(--amber)"][i % 4];
          return (
            <g key={s.label}>
              <path
                d={`M${x},${y} L${x + barW},${y} L${x + barW - 14},${y + barH} L${x + 14},${y + barH} Z`}
                fill={color} opacity="0.85"
              />
              <text x={w / 2} y={y + barH / 2 + 4} textAnchor="middle" fontSize="13" fontWeight="700" fill="#fff" fontFamily="var(--font-display)">
                {s.value}
              </text>
              <text x={w / 2} y={y - 4} textAnchor="middle" fontSize="10" fontWeight="600" fill="var(--text-mid)" fontFamily="var(--font-body)">{s.label}</text>
              {i > 0 && (
                <text x={w - 60} y={y + barH / 2 + 4} fontSize="11" fill="var(--text-low)" fontWeight="bold" fontFamily="var(--font-mono)">
                  {Math.round((s.value / (stages[i - 1].value || 1)) * 100)}%
                </text>
              )}
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function ConfusionMatrixHeatmap({ matrix, labels }) {
  if (!matrix || matrix.length === 0) return null;
  const max = Math.max(...matrix.flat(), 1);
  const cell = 54, pad = 90;
  const size = pad + cell * labels.length + 20;

  return (
    <div style={{ background: 'var(--surface-3)', border: '1px solid var(--border-soft)', borderRadius: 12, padding: '20px', marginTop: 15 }}>
      <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-low)', textTransform: 'uppercase', letterSpacing: '.5px', marginBottom: 15 }}>Confusion Matrix Heatmap</div>
      <svg viewBox={`0 0 ${size} ${size}`} width="100%" height="100%" style={{ maxWidth: 400, display: 'block', margin: '0 auto' }}>
        <text x={pad + (cell * labels.length) / 2} y="18" textAnchor="middle" fontSize="11" fontWeight="700" fill="var(--text-hi)" fontFamily="var(--font-display)">
          Predicted →
        </text>
        <text x="18" y={pad + (cell * labels.length) / 2} fontSize="11" fontWeight="700" fill="var(--text-hi)" fontFamily="var(--font-display)"
              transform={`rotate(-90 18 ${pad + (cell * labels.length) / 2})`}>
          Actual →
        </text>
        {labels.map((l, j) => (
          <text key={"c" + j} x={pad + j * cell + cell / 2} y={pad - 8} fontSize="9" fontWeight="600" fill="var(--text-mid)" textAnchor="middle" fontFamily="var(--font-body)">{l}</text>
        ))}
        {labels.map((l, i) => (
          <text key={"r" + i} x={pad - 8} y={pad + i * cell + cell / 2 + 4} fontSize="9" fontWeight="600" fill="var(--text-mid)" textAnchor="end" fontFamily="var(--font-body)">{l}</text>
        ))}
        {matrix.map((row, i) => row.map((v, j) => {
          const intensity = v / max;
          const isDiagonal = i === j;
          const fill = isDiagonal
            ? `rgba(22,194,174,${0.15 + intensity * 0.85})`
            : `rgba(229,72,77,${0.1 + intensity * 0.6})`;
          return (
            <g key={`${i}-${j}`}>
              <rect x={pad + j * cell} y={pad + i * cell} width={cell - 2} height={cell - 2} fill={fill} rx="4" />
              <text x={pad + j * cell + cell / 2} y={pad + i * cell + cell / 2 + 4}
                    textAnchor="middle" fontSize="12" fontWeight="700" fill={intensity > 0.5 ? "#fff" : "var(--text-hi)"} fontFamily="var(--font-mono)">
                {v}
              </text>
            </g>
          );
        }))}
      </svg>
    </div>
  );
}

function CapacityWaterfall({ steps }) {
  if (!steps || steps.length === 0) return null;
  const w = 640, h = 260, barW = 80, gap = 20;
  const maxVal = Math.max(...steps.map(s => Math.abs(s.value)), steps[0].value, 1);
  const scale = (h - 70) / maxVal;
  let running = 0;

  const colorFor = (type) =>
    type === "decrease" ? "var(--red)" : type === "start" || type === "subtotal" ? "var(--indigo)" : "var(--teal)";

  return (
    <div style={{ background: 'var(--surface-3)', border: '1px solid var(--border-soft)', borderRadius: 12, padding: '16px 20px', marginBottom: 24, marginTop: 15 }}>
      <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-low)', textTransform: 'uppercase', letterSpacing: '.5px', marginBottom: 12 }}>Repayment Capacity Waterfall (monthly deductions)</div>
      <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h}>
        <line x1="0" y1={h - 30} x2={w} y2={h - 30} stroke="var(--border-soft)" strokeWidth="1.5" />
        {steps.map((s, i) => {
          const x = i * (barW + gap) + 10;
          let barTop, barHeight;
          if (s.type === "start" || s.type === "subtotal" || s.type === "end") {
            barHeight = Math.abs(s.value) * scale;
            barTop = h - 30 - barHeight;
            running = s.value;
          } else {
            barHeight = Math.abs(s.value) * scale;
            barTop = h - 30 - (running * scale);
            running += s.value;
          }
          return (
            <g key={i}>
              <rect x={x} y={barTop} width={barW} height={Math.max(2, barHeight)} fill={colorFor(s.type)} opacity="0.85" rx="3" />
              <text x={x + barW / 2} y={barTop - 6} textAnchor="middle" fontSize="9" fontWeight="700" fill="var(--text-hi)" fontFamily="var(--font-mono)">
                {s.value < 0 ? "-" : ""}₹{Math.round(Math.abs(s.value)).toLocaleString('en-IN')}
              </text>
              <text x={x + barW / 2} y={h - 14} textAnchor="middle" fontSize="9" fill="var(--text-mid)" fontFamily="var(--font-body)">
                {s.label}
              </text>
              {i < steps.length - 1 && (
                <line x1={x + barW} y1={barTop} x2={x + barW + gap} y2={barTop}
                      stroke="var(--text-low)" strokeDasharray="2,2" />
              )}
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function TriggerCooccurrenceMatrix({ triggerNames, coMatrix }) {
  if (!triggerNames || !coMatrix || coMatrix.length === 0) return null;
  const n = triggerNames.length;
  const cell = 22, pad = 120;
  const size = pad + cell * n + 20;
  const max = Math.max(...coMatrix.flat().filter((_, idx) => idx % (n + 1) !== 0), 1);

  return (
    <div style={{ background: 'var(--surface-3)', border: '1px solid var(--border-soft)', borderRadius: 12, padding: '20px', marginTop: 15 }}>
      <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-low)', textTransform: 'uppercase', letterSpacing: '.5px', marginBottom: 15 }}>Trigger Co-occurrence Matrix (14 categories)</div>
      <svg viewBox={`0 0 ${size} ${size}`} width="100%" height="100%" style={{ maxWidth: 440, display: 'block', margin: '0 auto' }}>
        {triggerNames.map((name, i) => (
          <text key={"col" + i} x={pad + i * cell + cell / 2} y={pad - 6} fontSize="7" fill="var(--text-mid)" fontWeight="600"
                textAnchor="start" transform={`rotate(-45 ${pad + i * cell + cell / 2} ${pad - 6})`} fontFamily="var(--font-body)">
            {name}
          </text>
        ))}
        {triggerNames.map((name, i) => (
          <text key={"row" + i} x={pad - 8} y={pad + i * cell + cell / 2 + 3} fontSize="7.5" fill="var(--text-mid)" fontWeight="600" textAnchor="end" fontFamily="var(--font-body)">
            {name}
          </text>
        ))}
        {coMatrix.map((row, i) => row.map((v, j) => {
          if (i === j) return (
            <rect key={`${i}-${j}`} x={pad + j * cell} y={pad + i * cell} width={cell - 1} height={cell - 1} fill="var(--border-soft)" rx="2" />

  );

/* Waterfall showing Trust Score = Intent*0.4 + IncomeConf*0.3 + Repay*0.3 */
function TrustScoreWaterfall({ lead }) {
  if (!lead || lead.trust_score == null) return null;
  const intentContribution = Math.round(lead.intent_score * 0.4 * 10) / 10;
  const incomeContribution = Math.round((lead.income_confidence ?? 0) * 0.3 * 10) / 10;
  const repayContribution = Math.round((lead.repay_score ?? 0) * 0.3 * 10) / 10;

  const steps = [
    { label: "Intent Score x 0.4", value: intentContribution, color: "var(--tier1, #2dd4bf)" },
    { label: "Income Confidence x 0.3", value: incomeContribution, color: "var(--tier2, #f59e0b)" },
    { label: "Repayment Score x 0.3", value: repayContribution, color: "#818cf8" },
  ];

  const w = 440, h = 200, barW = 70, gap = 40;
  const maxScale = 100;
  let running = 0;
  const bars = steps.map((s, i) => {
    const startY = h - 30 - (running / maxScale) * (h - 60);
    running += s.value;
    const endY = h - 30 - (running / maxScale) * (h - 60);
    return { ...s, x: 40 + i * (barW + gap), yTop: Math.min(startY, endY), height: Math.abs(startY - endY) };
  });
  const totalY = h - 30 - (running / maxScale) * (h - 60);

  return (
    <div style={{ marginTop: 20 }}>
      <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-low)",
                    textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 12 }}>
        How the Trust Score Was Built
      </div>
      <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h}>
        <line x1="20" y1={h - 30} x2={w - 20} y2={h - 30} stroke="var(--border)" />
        {bars.map((b) => (
          <g key={b.label}>
            <rect x={b.x} y={b.yTop} width={barW} height={Math.max(b.height, 2)} rx="4" fill={b.color} />
            <text x={b.x + barW / 2} y={b.yTop - 6} textAnchor="middle" fontSize="12" fontWeight="700"
                  fill="var(--text-high, #e5e5e5)">
              +{b.value}
            </text>
            <text x={b.x + barW / 2} y={h - 14} textAnchor="middle" fontSize="10" fill="var(--text-low)">
              {b.label}
            </text>
          </g>
        ))}
        <rect x={40 + steps.length * (barW + gap)} y={totalY} width={barW}
              height={Math.max(h - 30 - totalY, 2)} rx="4" fill="var(--text-high, #e5e5e5)" />
        <text x={40 + steps.length * (barW + gap) + barW / 2} y={totalY - 6} textAnchor="middle"
              fontSize="13" fontWeight="700" fill="var(--text-high, #e5e5e5)">
          {lead.trust_score}
        </text>
        <text x={40 + steps.length * (barW + gap) + barW / 2} y={h - 14} textAnchor="middle"
              fontSize="10" fill="var(--text-low)">
          Trust Score
        </text>
      </svg>
    </div>
  );
}

/* ---------- Pulse waveform SVG (the signature element) ---------- */
function PulseLine({intensity = 50, color = 'var(--teal)', width = 200, height = 26, animate = true, id}) {
  const w = width, h = height, mid = h / 2;
  const segs = 6;
  const segW = w / segs;
  let d = `M0,${mid}`;
  const spikeIdx = Math.floor(segs / 2);
  for (let i = 0; i < segs; i++) {
    const x0 = i * segW;
    if (i === spikeIdx) {
      const peak = mid - (h * 0.42) * (intensity / 100);
      const trough = mid + (h * 0.22) * (intensity / 100);
      d += ` L${x0 + segW * 0.18},${mid} L${x0 + segW * 0.34},${peak} L${x0 + segW * 0.5},${trough} L${x0 + segW * 0.66},${mid - h*0.08} L${x0+segW*0.82},${mid}`;
    } else {
      d += ` L${x0 + segW * 0.5},${mid + (Math.sin(i) * h * 0.05)}`;
    }
    d += ` L${x0 + segW},${mid}`;
  }
  const gradId = 'pg-' + (id || Math.random().toString(36).slice(2));
  return (
    <svg width={width} height={height} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{display:'block'}}>
      <defs>
        <linearGradient id={gradId} x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor={color} stopOpacity="0.05" />
          <stop offset="50%" stopColor={color} stopOpacity="1" />
          <stop offset="100%" stopColor={color} stopOpacity="0.05" />
        </linearGradient>
      </defs>
      <path d={d} fill="none" stroke={`url(#${gradId})`} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round">
        {animate && <animate attributeName="stroke-dashoffset" from="220" to="0" dur="1.4s" begin="0s" />}
      </path>
    </svg>
  );
}

function CashflowSankey({ breakdown }) {
  if (!breakdown || !breakdown.buckets) return null;
  const buckets = Object.entries(breakdown.buckets).filter(([, value]) => value > 0);
  if (buckets.length === 0) return null;
  const w = 680, h = Math.max(260, buckets.length * 54 + 70);
  const sourceX = 40, sourceY = h / 2 - 38, sourceW = 140, sourceH = 76;
  const targetX = 470, targetW = 150;
  const maxBucket = Math.max(...buckets.map(([, value]) => value), 1);
  const colors = ["var(--teal)", "var(--amber)", "var(--indigo)", "var(--red)", "var(--violet)"];

  return (
    <div style={{ background: "var(--surface-3)", border: "1px solid var(--border-soft)", borderRadius: 12, padding: "16px 20px", marginTop: 18 }}>
      <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-low)", textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 12 }}>
        Cash Flow Sankey - Income to Spend Buckets
      </div>
      <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h}>
        <rect x={sourceX} y={sourceY} width={sourceW} height={sourceH} rx="8" fill="rgba(22,194,174,0.16)" stroke="var(--teal)" />
        <text x={sourceX + sourceW / 2} y={sourceY + 32} textAnchor="middle" fontSize="12" fontWeight="700" fill="var(--teal)">Total Inflow</text>
        <text x={sourceX + sourceW / 2} y={sourceY + 54} textAnchor="middle" fontSize="13" fontWeight="800" fill="var(--text-hi)">{fmtINR(breakdown.total_income)}</text>
        {buckets.map(([name, value], i) => {
          const y = 32 + i * 54;
          const strokeW = 6 + (value / maxBucket) * 22;
          const color = colors[i % colors.length];
          return (
            <g key={name}>
              <path d={`M${sourceX + sourceW},${sourceY + sourceH / 2} C300,${sourceY + sourceH / 2} 330,${y + 22} ${targetX},${y + 22}`}
                    fill="none" stroke={color} strokeWidth={strokeW} strokeLinecap="round" opacity="0.55" />
              <rect x={targetX} y={y} width={targetW} height="44" rx="7" fill="var(--surface)" stroke={color} />
              <text x={targetX + 12} y={y + 17} fontSize="11" fontWeight="700" fill="var(--text-hi)">{name}</text>
              <text x={targetX + 12} y={y + 34} fontSize="11" fill="var(--text-mid)">{fmtINR(value)}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function TransactionCalendarHeatmap({ transactions }) {
  if (!transactions || transactions.length === 0) return null;
  const days = 90, cell = 13, gap = 3, cols = 15, rows = 6;
  const today = new Date();
  const byDay = Array.from({ length: days }, (_, i) => {
    const d = new Date(today);
    d.setDate(today.getDate() - (days - 1 - i));
    return { date: d, amount: 0, count: 0 };
  });
  transactions.forEach(t => {
    const txDate = new Date(t.timestamp);
    const diff = Math.floor((today.getTime() - txDate.getTime()) / 864e5);
    if (diff >= 0 && diff < days) {
      const idx = days - 1 - diff;
      byDay[idx].amount += Math.abs(Number(t.amount) || 0);
      byDay[idx].count += 1;
    }
  });
  const maxAmount = Math.max(...byDay.map(d => d.amount), 1);
  const colorFor = (amount) => {
    if (!amount) return "var(--surface)";
    const intensity = 0.2 + Math.min(0.8, amount / maxAmount * 0.8);
    return `rgba(22,194,174,${intensity})`;
  };

  return (
    <div style={{ background: "var(--surface-3)", border: "1px solid var(--border-soft)", borderRadius: 12, padding: "16px 20px", marginTop: 18, marginBottom: 20 }}>
      <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-low)", textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 12 }}>
        Calendar Heatmap of Transactions
      </div>
      <svg viewBox={`0 0 ${cols * (cell + gap) + 70} ${rows * (cell + gap) + 34}`} width="100%" height="132">
        {byDay.map((d, i) => {
          const x = (i % cols) * (cell + gap) + 4;
          const y = Math.floor(i / cols) * (cell + gap) + 4;
          return (
            <rect key={i} x={x} y={y} width={cell} height={cell} rx="3" fill={colorFor(d.amount)}

function BehaviorRadarChart({ lead, customer }) {
  if (!lead) return null;
  const triggerScore = Math.min(100, (lead.triggers_fired?.length || 0) * 16);
  const metrics = [
    ["Intent", lead.intent_score || 0],
    ["Trust", lead.trust_score || 0],
    ["Income", lead.income_confidence ?? Math.max(0, 100 - (lead.income_accuracy_pct || 0))],

    ["Capacity", lead.capacity ? Math.min(100, (lead.capacity.safe_emi_ceiling / Math.max(lead.capacity.reconstructed_income, 1)) * 220) : 0],
    ["Signals", triggerScore],
  ];
  const size = 260, cx = 130, cy = 130, r = 92;
  const point = (i, value = 100) => {
    const angle = -Math.PI / 2 + (Math.PI * 2 * i) / metrics.length;

    return [cx + rr * Math.cos(angle), cy + rr * Math.sin(angle)];

  const path = metrics.map(([, value], i) => point(i, value).join(",")).join(" ");

  return (
    <div style={{ background: "var(--surface)", border: "1px solid var(--border-soft)", borderRadius: 12, padding: 18, marginTop: 20 }}>

        <svg viewBox={`0 0 ${size} ${size}`} width="100%" height={size}>
          {[25, 50, 75, 100].map(level => (
            <polygon key={level} points={metrics.map((_, i) => point(i, level).join(",")).join(" ")}
                     fill="none" stroke="var(--border-soft)" strokeWidth="1" />
          ))}
          {metrics.map((m, i) => {
            const [x, y] = point(i, 100);

              <g key={m[0]}>

        </div>
      </div>
    </div>

function RoiWaterfallChart({ roi }) {
  if (!roi) return null;
  const assessment = roi.total_customers * (roi.cost_assumptions?.cost_per_assessment || 0);
  const outreach = roi.total_leads * (roi.cost_assumptions?.cost_per_outreach || 0);
  const steps = [
    { label: "Expected Revenue", value: roi.estimated_revenue || 0, type: "gain" },
    { label: "Assessment Cost", value: -assessment, type: "cost" },
    { label: "Outreach Cost", value: -outreach, type: "cost" },
    { label: "Net Profit", value: roi.net_profit || 0, type: "total" },
  ];
  const w = 640, h = 260, barW = 95, gap = 38;
  const maxVal = Math.max(...steps.map(s => Math.abs(s.value)), 1);
  const yBase = h - 36;
  const scale = (h - 74) / maxVal;
  let running = 0;

  return (
    <div style={{ background: "var(--surface-3)", border: "1px solid var(--border-soft)", borderRadius: 12, padding: "16px 20px", marginBottom: 24 }}>
      <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-low)", textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 12 }}>
        ROI Waterfall - Revenue vs Cost vs Net Profit
      </div>
      <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h}>
        <line x1="20" y1={yBase} x2={w - 20} y2={yBase} stroke="var(--border)" />
        {steps.map((s, i) => {
          const x = 46 + i * (barW + gap);
          const start = s.type === "total" ? 0 : running;
          const end = s.type === "total" ? s.value : running + s.value;
          if (s.type !== "total") running = end;
          const y1 = yBase - start * scale;
          const y2 = yBase - end * scale;
          const top = Math.min(y1, y2);
          const height = Math.max(3, Math.abs(y2 - y1));
          const color = s.value < 0 ? "var(--red)" : s.type === "total" ? "var(--teal)" : "var(--indigo)";
          return (
            <g key={s.label}>
              <rect x={x} y={top} width={barW} height={height} rx="5" fill={color} opacity="0.86" />
              <text x={x + barW / 2} y={top - 7} textAnchor="middle" fontSize="10" fontWeight="700" fill="var(--text-hi)">{fmtINR(Math.abs(s.value))}</text>
              <text x={x + barW / 2} y={h - 14} textAnchor="middle" fontSize="10" fill="var(--text-mid)">{s.label}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function FraudRiskScatter({ anomalyData }) {

  if (!points.length) return null;
  const w = 560, h = 300, pad = 44;

  return (
    <div style={{ background: "var(--surface)", border: "1px solid var(--border-soft)", borderRadius: 12, padding: 18, marginBottom: 24 }}>

const REAL_ESTATE_PAYEES = new Set(["Lodha Developers", "Godrej Properties", "DLF Homes", "Sub-Registrar Office", "HDFC Property Escrow", "Brigade Group"]);
const AUTO_PAYEES = new Set(["Maruti Suzuki Arena", "Tata Motors Showroom", "Hyundai Dealership", "Mahindra Auto World", "TVS Motor Showroom"]);
const EDU_PAYEES = new Set(["DPS School Fees", "VIT Vellore Fees", "Manipal University", "Byju's Tuition"]);
const MEDICAL_PAYEES = new Set(["Apollo Hospitals", "Fortis Healthcare", "Manipal Hospital", "Star Health Insurance"]);
const WEDDING_PAYEES = new Set(["Banquet Hall Booking", "Wedding Decor Co", "Jewellery Mart", "Catering Services"]);

function isTriggerTxn(t) {
  if (t.type === "EMI_DEBIT") return true;
  if (REAL_ESTATE_PAYEES.has(t.counterparty)) return true;
  if (AUTO_PAYEES.has(t.counterparty)) return true;
  if (EDU_PAYEES.has(t.counterparty)) return true;
  if (MEDICAL_PAYEES.has(t.counterparty)) return true;
  if (WEDDING_PAYEES.has(t.counterparty)) return true;
  if (t.type === "UPI_DEBIT" && t.amount >= 50000) return true;
  return false;
}

            <div style={{fontSize:11, fontWeight:700, color:'var(--teal)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:6}}>Draft Outreach Message</div>
            <div style={{fontSize:13, lineHeight:1.7, color:'var(--text)', whiteSpace:'pre-wrap', fontFamily:'var(--font-mono)'}}>{data.outreach_draft}</div>
          </div>
          {data.objections && data.objections.length > 0 && (
            <div style={{background:'var(--surface)', borderRadius:10, padding:'14px 16px'}}>
              <div style={{fontSize:11, fontWeight:700, color:'var(--teal)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:10}}>Likely Objections &amp; Responses</div>
              <div style={{display:'flex', flexDirection:'column', gap:10}}>
                {data.objections.map((obj, i) => (
                  <div key={i} style={{borderLeft:'2px solid var(--border)', paddingLeft:12}}>
                    <div style={{fontSize:12.5, fontWeight:600, color:'var(--text)', marginBottom:4}}>Q: {obj.question}</div>
                    <div style={{fontSize:12.5, color:'var(--text-mid)', lineHeight:1.6}}>A: {obj.response}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ---------- WhatIf Simulator ---------- */
function WhatIfPanel({ customerId, token }) {
  const [amount, setAmount] = useState(50000);
  const [counterparty, setCounterparty] = useState("Lodha Developers");
  const [result, setResult] = useState(null);

  const runSimulation = async () => {
    const res = await fetch(`${API_BASE}/api/simulate/what-if`, {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
      body: JSON.stringify({
        customer_id: customerId,
        hypothetical_transaction: {
          type: "IMPS", amount: Number(amount), counterparty,
          timestamp: new Date().toISOString(),
        },
      }),
    });
    setResult(await res.json());
  };

  return (
    <div className="what-if-panel" style={{ marginTop: 20, padding: 16, background: 'var(--surface)', border: '1px solid var(--border-soft)', borderRadius: 12 }}>
      <h4 style={{ marginBottom: 10, color: 'var(--text-hi)' }}>Live What-If Simulator</h4>
      <div style={{ display: 'flex', gap: 10, marginBottom: 10 }}>
        <input style={{ flex: 1, padding: 8, background: 'var(--surface-2)', border: '1px solid var(--border)', borderRadius: 4, color: 'var(--text-hi)' }} value={amount} onChange={e => setAmount(e.target.value)} placeholder="Amount" />
        <input style={{ flex: 2, padding: 8, background: 'var(--surface-2)', border: '1px solid var(--border)', borderRadius: 4, color: 'var(--text-hi)' }} value={counterparty} onChange={e => setCounterparty(e.target.value)} placeholder="Counterparty" />
        <button style={{ padding: '8px 16px', background: 'var(--teal)', color: '#fff', border: 'none', borderRadius: 4, cursor: 'pointer' }} onClick={runSimulation}>Simulate</button>
      </div>
      {result && (
        <div style={{ fontSize: 13, color: 'var(--text-hi)', marginTop: 10 }}>
          <p>Intent Score: <strong>{result.before.intent_score} → {result.after.intent_score}</strong></p>
          {result.newly_fired_triggers.length > 0 && <p style={{ color: 'var(--accent)', marginTop: 4 }}>New triggers: {result.newly_fired_triggers.join(", ")}</p>}
        </div>
      )}
    </div>
  );
}

/* ---------- Detail panel ---------- */
function DetailPanel({customerId, token, onUnauthorized}) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);

  const lead = data?.lead;
  const customer = data?.customer;
  const transactions = data?.transactions || [];
  const income_breakdown = data?.income_breakdown;
  const cashflow_breakdown = data?.cashflow_breakdown;

  useEffect(() => {
    if (!customerId || !token) return;
    setLoading(true); setErr(null);
    fetch(`${API_BASE}/api/leads/${customerId}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    })
      .then(r => {
        if (r.status === 401) { onUnauthorized(); throw new Error('Session expired'); }
        if (!r.ok) throw new Error('Failed to load lead');
        return r.json();
      })
      .then(d => { setData(d); setLoading(false); })
      .catch(e => { setErr(e.message); setLoading(false); });
  }, [customerId, token, onUnauthorized]);

  const { dailyVolumes, triggerDays } = useMemo(() => {
    if (!data || !data.transactions) return { dailyVolumes: [], triggerDays: new Set() };
    const vols = Array.from({ length: 90 }, (_, i) => ({ day: i, amount: 0 }));
    const tDays = new Set();
    const today = new Date();
    
    data.transactions.forEach(t => {
      const txDate = new Date(t.timestamp);
      const diffDays = Math.floor((today.getTime() - txDate.getTime()) / 864e5);
      if (diffDays >= 0 && diffDays < 90) {
        const dayIdx = 89 - diffDays;
        vols[dayIdx].amount += Math.abs(t.amount);
        if (isTriggerTxn(t)) {
          tDays.add(dayIdx);
        }
      }
    });
    return { dailyVolumes: vols, triggerDays: tDays };
  }, [data]);

  const waterfallSteps = useMemo(() => {
    if (!lead || !lead.capacity) return [];
    const cap = lead.capacity;
    const utilities = -(cap.reconstructed_income - cap.existing_emi_monthly - cap.disposable_income);
    return [
      { label: "Reconstructed Income", value: cap.reconstructed_income, type: "start" },
      { label: "Existing EMIs", value: -cap.existing_emi_monthly, type: "decrease" },
      { label: "Recurring Utilities", value: Number(utilities.toFixed(2)), type: "decrease" },
      { label: "Disposable Income", value: cap.disposable_income, type: "subtotal" },
      { label: "Safe EMI Ceiling", value: -cap.safe_emi_ceiling, type: "decrease" },
      { label: "Eligible Principal", value: cap.recommended_eligible_amount, type: "end" }

    { loanType: "Personal Loan", min: 40, max: 50 },

      <CashflowSankey breakdown={cashflow_breakdown} />

      <AINarrativeCard customerId={customerId} token={token} />
    </div>
  );
}
