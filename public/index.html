function GovernanceDashboard({leads, stats, token, user, onUnauthorized}) {
  const [subTab, setSubTab] = useState('evaluation'); // 'evaluation', 'fairness', 'compliance', 'sandbox', 'roi', 'sentry'
  const [evalData, setEvalData] = useState(null);
  const [fairnessData, setFairnessData] = useState(null);
  const [complianceData, setComplianceData] = useState(null);
  const [sandboxData, setSandboxData] = useState(null);
  const [roiData, setRoiData] = useState(null);
  const [sentryData, setSentryData] = useState(null);
  const [geoCities, setGeoCities] = useState([]);
  const [segmentationData, setSegmentationData] = useState([]);
  const [auditTrailData, setAuditTrailData] = useState([]);
  const [askQuestion, setAskQuestion] = useState('');
  const [askAnswer, setAskAnswer] = useState(null);
  const [askLoading, setAskLoading] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const classes = ["None", "Home Loan", "Auto Loan", "Personal Loan", "Mortgage"];
  const matrixArray = useMemo(() => {
    if (!evalData || !evalData.confusion_matrix) return Array.from({length: 5}, () => Array(5).fill(0));
    return classes.map(actual => 
      classes.map(predicted => (evalData.confusion_matrix[actual]?.[predicted] || 0))
    );
  }, [evalData]);

  const triggerNames = [
    "SALARY_BOOST", "TXN_ACTIVITY", "EMI_DEBIT", "UPI_SPIKE", "REAL_ESTATE",
    "AUTO_INTEREST", "EDU_EXPENSE", "MED_EXPENSE", "WEDDING_IND", "BAL_DROP",
    "CC_PAYMENT", "UTIL_BOOST", "GIG_RECURRING", "INVEST_DIP"
  ];

  const triggerMap = {
    "salary_inflow_clustering": "SALARY_BOOST",
    "large_outward_transfer": "TXN_ACTIVITY",
    "emi_burden_increase": "EMI_DEBIT",
    "recurring_self_transfer": "UPI_SPIKE",
    "property_related_payment": "REAL_ESTATE",
    "auto_dealer_payment": "AUTO_INTEREST",
    "education_fee_payment": "EDU_EXPENSE",
    "medical_large_expense": "MED_EXPENSE",
    "wedding_season_spike": "WEDDING_IND",
    "overdraft_near_miss": "BAL_DROP",
    "credit_card_full_payment": "CC_PAYMENT",
    "bill_payment_consistency": "UTIL_BOOST",
    "multiple_income_sources": "GIG_RECURRING",
    "wallet_topup_frequency": "INVEST_DIP"
  };
  
  const coMatrix = useMemo(() => {
    const size = triggerNames.length;
    const matrix = Array.from({ length: size }, () => Array(size).fill(0));
    if (!leads) return matrix;
    
    leads.forEach(lead => {
      const active = new Set(
        (lead.triggers_fired || []).map(t => triggerMap[t] || t)
      );
      for (let i = 0; i < size; i++) {
        for (let j = 0; j < size; j++) {
          if (active.has(triggerNames[i]) && active.has(triggerNames[j])) {
            matrix[i][j] += 1;
          }
        }
      }
    });
    return matrix;
  }, [leads]);

  const funnelStages = useMemo(() => {
    if (!stats || !leads) return [];
    const t1Leads = leads.filter(l => l.tier === 'Tier 1').length;
    const projectedConversions = Math.round(leads.length * 0.15);
    return [
      { label: "Total Customers Scanned", value: stats.total_customers },
      { label: "Flagged Leads (Trigger Cleared)", value: leads.length },
      { label: "Tier 1 (High Trust Leads)", value: t1Leads },
      { label: "Projected Conversions (15% Yield)", value: projectedConversions }
    ];
  }, [stats, leads]);

  const fetchSubData = useCallback((tab) => {
    if (!token) return;
    setLoading(true); setError(null);
    let endpoint = '';
    if (tab === 'evaluation') endpoint = '/api/governance/evaluation';
    else if (tab === 'fairness') endpoint = '/api/governance/fairness';
    else if (tab === 'compliance') endpoint = '/api/governance/compliance';
    else if (tab === 'sandbox') endpoint = '/api/governance/sandbox-mapping';
    else if (tab === 'roi') endpoint = '/api/governance/roi';
    else if (tab === 'sentry') endpoint = '/api/governance/anomalies';

    const authHeaders = { 'Authorization': `Bearer ${token}` };

    fetch(`${API_BASE}${endpoint}`, {
      headers: authHeaders
    })
      .then(r => {
        if (r.status === 401) { onUnauthorized(); throw new Error('Session expired'); }
        if (!r.ok) throw new Error('Failed to load governance report');
        return r.json();
      })
      .then(data => {
        if (tab === 'evaluation') setEvalData(data);
        else if (tab === 'fairness') setFairnessData(data);
        else if (tab === 'compliance') setComplianceData(data);
        else if (tab === 'sandbox') setSandboxData(data);
        else if (tab === 'roi') setRoiData(data);
        else if (tab === 'sentry') setSentryData(data);
        setLoading(false);
      })
      .catch(e => {
        setError(e.message);
        setLoading(false);
      });

    if (tab === 'fairness') {
      fetch(`${API_BASE}/api/governance/geo-distribution`, { headers: authHeaders })
        .then(r => {
          if (r.status === 401) { onUnauthorized(); throw new Error('Session expired'); }
          if (!r.ok) throw new Error('Failed to load geo distribution');
          return r.json();
        })
        .then(setGeoCities)
        .catch(() => setGeoCities([]));
      fetch(`${API_BASE}/api/leads/segmentation`, { headers: authHeaders })
        .then(r => {
          if (r.status === 401) { onUnauthorized(); throw new Error('Session expired'); }
          if (!r.ok) throw new Error('Failed to load lead segmentation');
          return r.json();
        })
        .then(setSegmentationData)
        .catch(() => setSegmentationData([]));
    }

    if (tab === 'compliance' && user?.role === 'admin') {
      fetch(`${API_BASE}/api/governance/audit-trail`, { headers: authHeaders })
        .then(r => {
          if (r.status === 401) { onUnauthorized(); throw new Error('Session expired'); }
          if (!r.ok) throw new Error('Failed to load audit trail');
          return r.json();
        })
        .then(setAuditTrailData)
        .catch(() => setAuditTrailData([]));
    }
  }, [token, onUnauthorized, user]);

  const submitAsk = () => {
    if (!askQuestion.trim() || askLoading) return;
    setAskLoading(true); setAskAnswer(null);
    fetch(`${API_BASE}/api/governance/ask`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: askQuestion.trim() })
    })
      .then(r => r.json())
      .then(d => { setAskAnswer(d.answer || d.detail || 'No answer returned.'); setAskLoading(false); })
      .catch(e => { setAskAnswer(`Error: ${e.message}`); setAskLoading(false); });
  };

  useEffect(() => {
    fetchSubData(subTab);
  }, [subTab, fetchSubData]);

  const renderContent = () => {
    if (loading) return <div style={{padding: 50, textAlign: 'center'}}><div className="spinner" style={{margin: '0 auto'}}></div></div>;
    if (error) return <div className="error-banner">{error}</div>;

    if (subTab === 'evaluation' && evalData) {
      const {confusion_matrix, class_metrics, macro_averages} = evalData;
      const classes = ["None", "Home Loan", "Auto Loan", "Personal Loan", "Mortgage"];
      return (
        <div>
          <h3>Model Classification Self-Evaluation</h3>
          <p style={{fontSize: 13, color: 'var(--text-mid)', marginBottom: 20}}>
            Calculated dynamically across all database customers. Real-world behavioral signals carry inherent ambiguity, leading to class deviations which are tracked here in real-time.
          </p>
          
          <div className="metric-grid" style={{marginBottom: 28}}>
            <div className="metric-card">
              <div className="l">Macro Precision</div>
              <div className="v">{macro_averages.precision}%</div>
              <div className="d">Avg positive predictive value</div>
            </div>
            <div className="metric-card">
              <div className="l">Macro Recall</div>
              <div className="v">{macro_averages.recall}%</div>
              <div className="d">Avg sensitivity across classes</div>
            </div>
            <div className="metric-card">
              <div className="l">Macro F1-Score</div>
              <div className="v">{macro_averages.f1_score}%</div>
              <div className="d">Harmonic mean of precision/recall</div>
            </div>
          </div>

          <div style={{display: 'grid', gridTemplateColumns: 'minmax(0, 1.2fr) minmax(0, 1fr)', gap: 24, alignItems: 'start'}}>
            <div>
              <h4 style={{margin: '0 0 12px'}}>Confusion Matrix</h4>
              <div style={{overflowX: 'auto', background: 'var(--surface)', border: '1px solid var(--border-soft)', borderRadius: 12, padding: 16}}>
                <table style={{width: '100%', borderCollapse: 'collapse', textAlign: 'center', fontSize: 13}}>
                  <thead>
                    <tr>
                      <th style={{padding: '8px 4px', borderBottom: '1px solid var(--border)', color: 'var(--text-low)', fontSize: 11, textAlign: 'left'}}>Actual \ Pred</th>
                      {classes.map(c => <th key={c} style={{padding: '8px 4px', borderBottom: '1px solid var(--border)', fontWeight: 600}}>{c}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    {classes.map(actual => (
                      <tr key={actual}>
                        <td style={{padding: '10px 4px', borderBottom: '1px solid var(--border-soft)', fontWeight: 600, color: 'var(--text-mid)', textAlign: 'left'}}>{actual}</td>
                        {classes.map(pred => {
                          const val = confusion_matrix[actual]?.[pred] || 0;
                          const isDiagonal = actual === pred;
                          return (
                            <td key={pred} style={{
                              padding: '10px 4px', 
                              borderBottom: '1px solid var(--border-soft)',
                              fontFamily: 'var(--font-mono)',
                              background: isDiagonal && val > 0 ? 'rgba(22, 194, 174, 0.08)' : undefined,
                              color: isDiagonal && val > 0 ? 'var(--teal)' : 'var(--text-hi)'
                            }}>
                              {val}
                            </td>
                          );
                        })}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
            
            <div>
              <h4 style={{margin: '0 0 12px'}}>Class Metrics Breakdown</h4>
              <div style={{background: 'var(--surface)', border: '1px solid var(--border-soft)', borderRadius: 12, padding: 16, overflowX: 'auto'}}>
                <table style={{width: '100%', borderCollapse: 'collapse', fontSize: 12.5, textAlign: 'left'}}>
                  <thead>
                    <tr>
                      <th style={{padding: '8px 4px', borderBottom: '1px solid var(--border)', fontWeight: 600}}>Loan Product</th>
                      <th style={{padding: '8px 4px', borderBottom: '1px solid var(--border)', fontWeight: 600, textAlign: 'right'}}>Precision</th>
                      <th style={{padding: '8px 4px', borderBottom: '1px solid var(--border)', fontWeight: 600, textAlign: 'right'}}>Recall</th>
                      <th style={{padding: '8px 4px', borderBottom: '1px solid var(--border)', fontWeight: 600, textAlign: 'right'}}>F1 Score</th>
                      <th style={{padding: '8px 4px', borderBottom: '1px solid var(--border)', fontWeight: 600, color: 'var(--text-low)', fontSize: 11, textAlign: 'right'}}>TP/FP/FN</th>
                    </tr>
                  </thead>
                  <tbody>
                    {["Home Loan", "Auto Loan", "Personal Loan", "Mortgage"].map(c => {
                      const m = class_metrics[c] || {precision: 0, recall: 0, f1_score: 0, tp: 0, fp: 0, fn: 0};
                      return (
                        <tr key={c}>
                          <td style={{padding: '10px 4px', borderBottom: '1px solid var(--border-soft)', fontWeight: 600, color: 'var(--text-mid)'}}>{c}</td>
                          <td style={{padding: '10px 4px', borderBottom: '1px solid var(--border-soft)', fontFamily: 'var(--font-mono)', textAlign: 'right'}}>{m.precision}%</td>
                          <td style={{padding: '10px 4px', borderBottom: '1px solid var(--border-soft)', fontFamily: 'var(--font-mono)', textAlign: 'right'}}>{m.recall}%</td>
                          <td style={{padding: '10px 4px', borderBottom: '1px solid var(--border-soft)', fontFamily: 'var(--font-mono)', color: 'var(--teal)', fontWeight: 'bold', textAlign: 'right'}}>{m.f1_score}%</td>
                          <td style={{padding: '10px 4px', borderBottom: '1px solid var(--border-soft)', color: 'var(--text-low)', fontSize: 11, textAlign: 'right'}}>{m.tp}/{m.fp}/{m.fn}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
            </div>
          </div>
        </div>

        <div style={{display: 'grid', gridTemplateColumns: 'minmax(0, 1.2fr) minmax(0, 1.1fr)', gap: 24, marginTop: 28}}>
          <ConfusionMatrixHeatmap matrix={matrixArray} labels={classes} />
          <TriggerCooccurrenceMatrix triggerNames={triggerNames} coMatrix={coMatrix} />
        </div>
      </div>
    );
  }

    if (subTab === 'fairness' && fairnessData) {
      const {segments, best_performing_segment, best_conversion_rate_pct, flagged_segments, recommendation_summary} = fairnessData;
      return (
        <div>
          <h3>Dynamic Fairness & Bias Audit</h3>
          <p style={{fontSize: 13, color: 'var(--text-mid)', marginBottom: 20}}>
            Monitors lending conversion rates across demographics. If any segment underperforms the best segment by <b>20 percentage points or more</b>, it triggers an algorithmic warning.
          </p>

          <div style={{display: 'grid', gridTemplateColumns: 'minmax(0, 1.2fr) minmax(0, 1fr)', gap: 24, alignItems: 'start'}}>
            <div>
              <h4 style={{margin: '0 0 12px'}}>Segment Conversion Rates</h4>
              <div style={{display: 'flex', flexDirection: 'column', gap: 10}}>
                {segments.map(seg => {
                  const isBest = seg.segment_name === best_performing_segment;
                  return (
                    <div key={seg.segment_name} style={{background: 'var(--surface)', border: '1px solid var(--border-soft)', borderRadius: 10, padding: 14}}>
                      <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: 6, fontSize: 13}}>
                        <b>{seg.segment_name}</b>
                        <span>
                          {seg.total_leads} / {seg.total_customers} leads ({seg.conversion_rate_pct}%)
                        </span>
                      </div>
                      <div style={{display: 'flex', alignItems: 'center', gap: 10}}>
                        <div style={{flex: 1, height: 8, background: 'var(--surface-3)', borderRadius: 4, overflow: 'hidden'}}>
                          <div style={{
                            width: `${seg.conversion_rate_pct}%`,
                            height: '100%',
                            background: seg.is_underperforming ? 'var(--red)' : 'var(--teal)'
                          }}></div>
                        </div>
                        <span style={{fontSize: 11, fontFamily: 'var(--font-mono)', color: seg.is_underperforming ? 'var(--red)' : 'var(--text-mid)'}}>
                          {isBest ? 'BEST' : `-${seg.gap_to_best_pp}pp`}
                        </span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div>
              <h4 style={{margin: '0 0 12px'}}>Fairness Gaps & Interventions</h4>
              <div style={{background: flagged_segments.length ? 'rgba(229,72,77,0.06)' : 'rgba(22,194,174,0.06)', border: `1px solid ${flagged_segments.length ? 'rgba(229,72,77,0.3)' : 'rgba(22,194,174,0.3)'}`, borderRadius: 12, padding: 18}}>
                <div style={{fontWeight: 600, fontSize: 14, color: flagged_segments.length ? '#F2A0A2' : 'var(--teal)', display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12}}>
                  <span style={{width: 8, height: 8, borderRadius: '50%', background: flagged_segments.length ? 'var(--red)' : 'var(--teal)'}}></span>
                  {flagged_segments.length ? 'Bias Alert Triggered' : 'Fairness Standard Met'}
                </div>
                <p style={{fontSize: 12.5, lineHeight: 1.5, margin: '0 0 14px', color: 'var(--text-hi)'}}>
                  {recommendation_summary}
                </p>
                {flagged_segments.map((f, i) => (
                  <div key={i} style={{fontSize: 12, borderTop: '1px solid var(--border-soft)', paddingTop: 10, marginTop: 10, color: 'var(--text-mid)'}}>
                    <b>{f.segment_name} Recommendation:</b><br/>{f.recommendation}
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div style={{display: 'grid', gridTemplateColumns: 'minmax(0, 1fr) minmax(0, 1fr)', gap: 24, marginTop: 28, alignItems: 'start'}}>
            <div style={{background: 'var(--surface)', border: '1px solid var(--border-soft)', borderRadius: 12, padding: 18}}>
              <FairnessBarChart segments={segments} />
            </div>
            <div style={{background: 'var(--surface)', border: '1px solid var(--border-soft)', borderRadius: 12, padding: 18}}>
              <GeoDistributionMap cities={geoCities} />
            </div>
          </div>

          <div style={{background: 'var(--surface)', border: '1px solid var(--border-soft)', borderRadius: 12, padding: 18, marginTop: 24}}>
            <SegmentationBubbleChart segments={segmentationData} />
          </div>
        </div>
      );
    }

    if (subTab === 'compliance' && complianceData) {
      const {compliance_status, standards, overall_summary, recommendations, gaps} = complianceData;
      return (
        <div>
          <h3>Regulatory Compliance Matrix</h3>
          <p style={{fontSize: 13, color: 'var(--text-mid)', marginBottom: 20}}>
            Audits LENS against statutory frameworks: India's Digital Personal Data Protection (DPDP) Act 2023 and RBI Digital Lending Guidelines.
          </p>

          <div style={{display: 'grid', gridTemplateColumns: 'minmax(0, 1.2fr) minmax(0, 1fr)', gap: 24, alignItems: 'start'}}>
            <div style={{display: 'flex', flexDirection: 'column', gap: 14}}>
              {Object.entries(standards).map(([key, std]) => {
                const isCompliant = std.status === 'Compliant';
                return (
                  <div key={key} style={{background: 'var(--surface)', border: '1px solid var(--border-soft)', borderRadius: 12, padding: 18}}>
                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8}}>
                      <h4 style={{margin: 0, fontSize: 14, fontFamily: 'var(--font-display)'}}>{key.replace(/_/g, ' ')}</h4>
                      <span style={{
                        fontSize: 10,
                        fontWeight: 700,
                        padding: '3px 8px',
                        borderRadius: 6,
                        background: isCompliant ? 'rgba(22,194,174,0.12)' : 'rgba(242,135,12,0.12)',
                        color: isCompliant ? 'var(--teal)' : 'var(--amber)'
                      }}>{std.status.toUpperCase()}</span>
                    </div>
                    <p style={{fontSize: 12, color: 'var(--text-low)', margin: '0 0 10px'}}>{std.description} — {std.considerations}</p>
                    {std.gaps.length > 0 && (
                      <div style={{fontSize: 12, marginTop: 10}}>
                        <b style={{color: 'var(--red)'}}>Detected Gaps:</b>
                        <ul style={{margin: '4px 0 10px', paddingLeft: 20, color: 'var(--text-mid)'}}>
                          {std.gaps.map((g, idx) => <li key={idx} style={{marginBottom: 3}}>{g}</li>)}
                        </ul>
                      </div>
                    )}
                    <div style={{fontSize: 12}}>
                      <b style={{color: 'var(--teal)'}}>Compliance Action:</b>
                      <ul style={{margin: '4px 0 0', paddingLeft: 20, color: 'var(--text-mid)'}}>
                        {std.recommendations.map((r, idx) => <li key={idx} style={{marginBottom: 3}}>{r}</li>)}
                      </ul>
                    </div>
                  </div>
                );
              })}
            </div>

            <div>
              <h4 style={{margin: '0 0 12px'}}>Audit Summary</h4>
              <div style={{background: 'var(--surface-2)', border: '1px solid var(--border)', borderRadius: 12, padding: 18}}>
                <div style={{fontSize: 14, fontWeight: 600, color: compliance_status === 'Compliant' ? 'var(--teal)' : 'var(--amber)', marginBottom: 8}}>
                  Status: {compliance_status}
                </div>
                <p style={{fontSize: 13, lineHeight: 1.5, color: 'var(--text-mid)', margin: '0 0 14px'}}>
                  {overall_summary}
                </p>
                <div style={{fontSize: 12, borderTop: '1px solid var(--border-soft)', paddingTop: 12}}>
                  <b>System Gaps ({gaps.length})</b>
                  <ol style={{margin: '6px 0 0', paddingLeft: 18, color: 'var(--text-low)', lineHeight: 1.4}}>
                    {gaps.map((g, i) => <li key={i} style={{marginBottom: 6}}>{g}</li>)}
                  </ol>
                </div>
              </div>
            </div>
          </div>

          {user?.role === 'admin' && <AuditTrailTimeline events={auditTrailData} />}
        </div>
      );
    }

    if (subTab === 'sandbox' && sandboxData) {
      const {schema_version, validation_notes, mappings, missing_mappings} = sandboxData;
      return (
        <div>
          <h3>Sandbox API Schema Mapping</h3>
          <p style={{fontSize: 13, color: 'var(--text-mid)', marginBottom: 20}}>
            Schema mappings and data transformations matching standard core banking / aggregator API schemas. Schema Version: <b>{schema_version}</b>.
          </p>

          <table className="txn-table" style={{width: '100%'}}>
            <thead>
              <tr>
                <th style={{padding: '10px 12px'}}>Internal Field</th>
                <th style={{padding: '10px 12px'}}>Sandbox Field</th>
                <th style={{padding: '10px 12px'}}>Transformation</th>
                <th style={{padding: '10px 12px'}}>Validation Rules</th>
                <th style={{padding: '10px 12px', textAlign: 'right'}}>Status</th>
              </tr>
            </thead>
            <tbody>
              {mappings.map((m, idx) => (
                <tr key={idx}>
                  <td style={{fontFamily: 'var(--font-mono)', fontSize: 12}}>{m.internal_field}</td>
                  <td style={{fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--teal)'}}>{m.sandbox_field}</td>
                  <td>{m.transformation}</td>
                  <td style={{fontSize: 11.5, color: 'var(--text-low)'}}>{m.validation_rules}</td>
                  <td style={{textAlign: 'right'}}><span className="txn-type-tag" style={{background: 'rgba(22,194,174,0.1)', color: 'var(--teal)'}}>{m.status}</span></td>
                </tr>
              ))}
              {missing_mappings.map((m, idx) => (
                <tr key={idx} style={{opacity: 0.6}}>
                  <td style={{fontFamily: 'var(--font-mono)', fontSize: 12}}>{m.internal_field}</td>
                  <td style={{fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--text-low)'}}>{m.sandbox_field}</td>
                  <td style={{color: 'var(--text-low)'}}>Excluded</td>
                  <td style={{fontSize: 11.5, color: 'var(--text-low)'}}>{m.reason}</td>
                  <td style={{textAlign: 'right'}}><span className="txn-type-tag" style={{background: 'var(--surface-3)', color: 'var(--text-low)'}}>skipped</span></td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{marginTop: 18, fontSize: 12, color: 'var(--text-low)'}}>
            <b>Validation Notes:</b> {validation_notes}
          </div>
        </div>
      );
    }

    if (subTab === 'roi' && roiData) {
      const {total_customers, total_leads, conversion_rate_pct, estimated_revenue, estimated_cost, net_profit, roi_multiplier, segment_performance, cost_assumptions} = roiData;
      return (
        <div>
          <h3>Dynamic Business ROI Optimization</h3>
          <p style={{fontSize: 13, color: 'var(--text-mid)', marginBottom: 20}}>
            Financial projections based on current scans. Assess computation costs vs expected loan interest margins.
          </p>

          <div className="metric-grid" style={{marginBottom: 24}}>
            <div className="metric-card">
              <div className="l">Total Cost</div>
              <div className="v">{fmtINR(estimated_cost)}</div>
              <div className="d">Compute + outreach cost</div>
            </div>
            <div className="metric-card">
              <div className="l">Expected Revenue</div>
              <div className="v">{fmtINR(estimated_revenue)}</div>
              <div className="d">Yield from projected disbursals</div>
            </div>
            <div className="metric-card" style={{borderColor: 'var(--teal-dim)'}}>
              <div className="l">Expected Net Profit / ROI</div>
              <div className="v" style={{color: 'var(--teal)'}}>{fmtINR(net_profit)} <span style={{fontSize: 12, color: 'var(--text-low)', fontWeight: 500}}>({roi_multiplier}x)</span></div>
              <div className="d">Projections on current database</div>
            </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0, 1.2fr) minmax(0, 1fr)', gap: 24, marginBottom: 28, alignItems: 'center' }}>
            <PipelineFunnel stages={funnelStages} />
            <RoiDonut 
              assessmentCost={total_customers * (cost_assumptions?.cost_per_assessment || 5.0)}
              outreachCost={total_leads * (cost_assumptions?.cost_per_outreach || 50.0)}
              netProfit={net_profit}
            />
          </div>

          <RoiWaterfallChart roi={roiData} />

          <h4 style={{margin: '0 0 10px'}}>ROI Breakdown by Customer Segment</h4>
          <table className="txn-table" style={{width: '100%'}}>
            <thead>
              <tr>
                <th style={{padding: '10px 12px'}}>Segment</th>
                <th style={{padding: '10px 12px', textAlign: 'center'}}>Customers</th>
                <th style={{padding: '10px 12px', textAlign: 'center'}}>Leads</th>
                <th style={{padding: '10px 12px', textAlign: 'center'}}>Outreach Cost</th>
                <th style={{padding: '10px 12px', textAlign: 'center'}}>Projected Revenue</th>
                <th style={{padding: '10px 12px', textAlign: 'right'}}>Projected ROI</th>

                  <td style={{textAlign: 'center', fontFamily: 'var(--font-mono)', color: 'var(--teal)'}}>{fmtINR(s.expected_revenue)}</td>

/* ---------- Admin Panel ---------- */
function AdminPanel({token, onUnauthorized, showToast}) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showCreateModal, setShowCreateModal] = useState(false);
  const [form, setForm] = useState({ name: '', email: '', password: '', role: 'relationship_manager' });
  const [error, setError] = useState(null);
  const [submitting, setSubmitting] = useState(false);

  const loadUsers = useCallback(() => {
    fetch(`${API_BASE}/api/users`, { headers: { 'Authorization': `Bearer ${token}` } })
      .then(r => {
        if (r.status === 401) { onUnauthorized(); throw new Error('unauthorized'); }
        return r.json();
      })
      .then(data => { setUsers(Array.isArray(data) ? data : []); setLoading(false); })
      .catch(() => { setLoading(false); });
  }, [token, onUnauthorized]);

  useEffect(() => { loadUsers(); }, [loadUsers]);

  const handleDelete = (userId, userName) => {
    if (!window.confirm(`Remove user "${userName}"? This action cannot be undone.`)) return;
    fetch(`${API_BASE}/api/users/${userId}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` }
    })
      .then(async r => {
        if (r.status === 401) { onUnauthorized(); return; }
        const d = await r.json();
        if (d.status === 'deleted') {
          setUsers(prev => prev.filter(u => u.user_id !== userId));
          showToast(`User "${userName}" removed`, 'success');
        }
      })
      .catch(() => showToast('Failed to delete user', 'error'));
  };

  const handleCreateUserSubmit = (e) => {
    e.preventDefault();
    setError(null);
    setSubmitting(true);
    fetch(`${API_BASE}/api/users`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify(form)
    })
      .then(async r => {
        if (r.status === 401) { onUnauthorized(); return; }
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || 'Failed to create user');
        return d;
      })
      .then(newUser => {
        if (newUser) {
          setUsers(prev => [newUser, ...prev]);
          setShowCreateModal(false);
          setForm({ name: '', email: '', password: '', role: 'relationship_manager' });
          showToast(`User "${newUser.name}" created`, 'success');
        }
        setSubmitting(false);
      })
      .catch(err => {
        setError(err.message);
        setSubmitting(false);
      });
  };

  const roleClass = (role) => role === 'admin' ? 'admin' : role === 'relationship_manager' ? 'rm' : 'analyst';
  const roleTag = (role) => role === 'relationship_manager' ? 'RM' : role.charAt(0).toUpperCase() + role.slice(1);
  const avatarInitials = (name) => name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();

  if (loading) return <div className="admin-section"><div style={{display:'flex',justifyContent:'center',padding:60}}><div className="spinner"></div></div></div>;

  return (
    <div className="admin-section">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
        <div>
          <div className="section-title" style={{margin:0}}><span className="dot"></span>User Management</div>
          <div style={{fontSize:13,color:'var(--text-low)',marginTop:6}}>{users.length} registered user{users.length !== 1 ? 's' : ''}</div>
        </div>
        <button className="btn primary" onClick={() => { setError(null); setShowCreateModal(true); }}>
          + Create User
        </button>
      </div>
      <div className="admin-grid">
        {users.map(u => (
          <div key={u.user_id} className="admin-user-card">
            <div className={`admin-user-avatar role-${roleClass(u.role)}`}>{avatarInitials(u.name)}</div>
            <div className="admin-user-info">
              <div className="admin-user-name">{u.name}</div>
              <div className="admin-user-meta">{u.email}</div>
              <div style={{marginTop:6}}>
                <span className={`role-tag ${u.role}`}>{roleTag(u.role)}</span>
              </div>
            </div>
            <div style={{marginLeft:'auto',fontSize:12,color:'var(--text-low)',textAlign:'right'}}>
              <div>Joined</div>
              <div style={{color:'var(--text-mid)'}}>{new Date(u.created_at).toLocaleDateString('en-IN')}</div>
            </div>
            <button
              className="btn danger"
              style={{padding:'7px 12px',fontSize:12}}
              onClick={() => handleDelete(u.user_id, u.name)}
            >
              Remove
            </button>
          </div>
        ))}
        {users.length === 0 && (
          <div style={{padding:40,textAlign:'center',color:'var(--text-low)',fontSize:13}}>No users found.</div>
        )}
      </div>

      {showCreateModal && (
        <div className="modal-overlay" onClick={() => setShowCreateModal(false)}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <h3>Create New User Account</h3>
              <button className="modal-close" onClick={() => setShowCreateModal(false)}>&times;</button>
            </div>
            {error && <div className="auth-error">{error}</div>}
            <form onSubmit={handleCreateUserSubmit}>
              <div className="auth-field">
                <label>Full Name</label>
                <input type="text" className="auth-input" required placeholder="e.g. Anand Sen"
                  value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
              </div>
              <div className="auth-field">
                <label>Email Address</label>
                <input type="email" className="auth-input" required placeholder="e.g. anand@idbibank.com"
                  value={form.email} onChange={e => setForm({...form, email: e.target.value})} />
              </div>
              <div className="auth-field">
                <label>Password</label>
                <input type="password" className="auth-input" required minLength="8" placeholder="••••••••"
                  value={form.password} onChange={e => setForm({...form, password: e.target.value})} />
              </div>
              <div className="auth-field">
                <label>Assigned Role</label>
                <select className="auth-select" value={form.role}
                  onChange={e => setForm({...form, role: e.target.value})}>
                  <option value="relationship_manager">Relationship Manager</option>
                  <option value="analyst">Analyst (Read-Only)</option>
                  <option value="admin">Administrator</option>
                </select>
              </div>
              <div className="form-actions">
                <button type="button" className="btn" onClick={() => setShowCreateModal(false)}>Cancel</button>
                <button type="submit" className="btn primary" disabled={submitting}>
                  {submitting ? 'Creating…' : 'Create User'}
                </button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- App ---------- */
function App() {
  const [auth, setAuth] = useState(() => {
    try {
      const stored = localStorage.getItem(storageKey);
      return stored ? JSON.parse(stored) : null;
    } catch (e) { return null; }
  });

  const [activeTab, setActiveTab] = useState('leads');
  const [stats, setStats] = useState(null);
  const [leads, setLeads] = useState([]);
  const [selected, setSelected] = useState(null);
  const [tierFilter, setTierFilter] = useState('All');
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState('trust_score');
  const [loading, setLoading] = useState(true);
  const [generating, setGenerating] = useState(false);
  const [connError, setConnError] = useState(null);
  const [regenError, setRegenError] = useState(null);
  const [toast, setToast] = useState(null);
  const generationInFlightRef = useRef(false);

  const [usersRegistered, setUsersRegistered] = useState(0);
  const [authMode, setAuthMode] = useState('login');
  const [authForm, setAuthForm] = useState({ name: '', email: '', password: '', role: 'relationship_manager' });
  const [authError, setAuthError] = useState(null);
  const [authLoading, setAuthLoading] = useState(false);

  const [showCustomerModal, setShowCustomerModal] = useState(false);
  const [showTxnModal, setShowTxnModal] = useState(false);
  const [modalFormError, setModalFormError] = useState(null);
  const [modalFormLoading, setModalFormLoading] = useState(false);

  const [customerForm, setCustomerForm] = useState({
    customer_id: '', name: '', age: 32, city: '', state: '', employment_type: 'Salaried',
    declared_income: '', true_monthly_income: '', true_loan_type: 'None', persona: 'manual'
  });

  const [txnForm, setTxnForm] = useState({
    customer_id: '', type: 'SALARY_CREDIT', amount: '', counterparty: 'Employer Payroll', timestamp: ''
  });

  const showToast = useCallback((msg, type = 'success') => {
    setToast({msg, type});
  }, []);

  const handleUnauthorized = useCallback(() => {
    setAuth(null);
    localStorage.removeItem(storageKey);
    setAuthError("Session expired — please log in again");
  }, []);

  const checkUsers = useCallback(() => {
    fetch(`${API_BASE}/api/health`)
      .then(r => r.json())
      .then(d => {
        setUsersRegistered(d.users_registered || 0);
        if (d.users_registered === 0) {
          setAuthMode('register');
          setAuthForm(prev => ({ ...prev, role: 'admin' }));
        }
      })
      .catch(() => {});
  }, []);

  useEffect(() => { checkUsers(); }, [auth, checkUsers]);

  const loadAll = useCallback(() => {
    if (!auth) return;
    setLoading(true); setConnError(null);
    Promise.all([
      fetch(`${API_BASE}/api/stats`, { headers: { 'Authorization': `Bearer ${auth.token}` } })
        .then(r => {
          if (r.status === 401) { handleUnauthorized(); throw new Error('unauthorized'); }
          if (!r.ok) throw new Error('stats');
          return r.json();
        }),
      fetch(`${API_BASE}/api/leads?sort=${sort}&limit=200`, { headers: { 'Authorization': `Bearer ${auth.token}` } })
        .then(r => {
          if (r.status === 401) { handleUnauthorized(); throw new Error('unauthorized'); }
          if (!r.ok) throw new Error('leads');
          return r.json();
        }),
    ]).then(([s, l]) => { setStats(s); setLeads(l); setLoading(false); if (l.length) setSelected(prev => prev || l[0].customer_id); })
      .catch((e) => {
        if (e.message !== 'unauthorized') setConnError(true);
        setLoading(false);
      });
  }, [sort, auth, handleUnauthorized]);

  useEffect(() => { if (auth) loadAll(); }, [loadAll, auth]);

  const waitForGenerationToFinish = useCallback((attempt = 0) => {
    return fetch(`${API_BASE}/api/health`)
      .then(r => r.json())
      .then(d => {
        if (d.is_generating && attempt < 90) {
          return new Promise(resolve => setTimeout(resolve, 2000))
            .then(() => waitForGenerationToFinish(attempt + 1));
        }
        if (d.is_generating) {
          throw new Error('Generation is still running. Restart the backend if this does not clear.');
        }
        return d;
      });
  }, []);

  const handleAuthSubmit = (e) => {
    e.preventDefault();
    setAuthError(null);
    setAuthLoading(true);
    const url = authMode === 'login' ? `${API_BASE}/api/auth/login` : `${API_BASE}/api/auth/register`;
    const payload = authMode === 'login'
      ? { email: authForm.email, password: authForm.password }
      : { name: authForm.name, email: authForm.email, password: authForm.password, role: authForm.role };

    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
      .then(async r => {
        const data = await r.json();
        if (!r.ok) throw new Error(data.detail || 'Authentication failed');
        return data;
      })
      .then(d => {
        const newAuth = { token: d.token, user: d.user };
        setAuth(newAuth);
        localStorage.setItem(storageKey, JSON.stringify(newAuth));
        setAuthLoading(false);
      })
      .catch(err => { setAuthError(err.message); setAuthLoading(false); });
  };

  const handleLogout = () => {
    if (!auth) return;
    fetch(`${API_BASE}/api/auth/logout`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${auth.token}` }
    }).finally(() => {
      setAuth(null);
      localStorage.removeItem(storageKey);
      setSelected(null); setLeads([]); setStats(null);
    });
  };

  const handleRegenerate = async () => {
    if (!auth || generationInFlightRef.current) return;
    generationInFlightRef.current = true;
    setGenerating(true);
    setRegenError(null);
    try {
      const r = await fetch(`${API_BASE}/api/generate?n_customers=150`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${auth.token}` }
      });

        if (r.status === 401) { handleUnauthorized(); throw new Error('unauthorized'); }
        if (r.status === 409) {
          const data = await r.json().catch(() => ({}));
          const rawDetail = data.detail;
          const detail = typeof rawDetail === 'string'
            ? rawDetail
            : rawDetail?.message || "Database generation is already in progress. Please wait.";
          setRegenError(`${detail} Refreshing automatically when it finishes.`);
          await waitForGenerationToFinish();
          setRegenError(null);
          showToast('Existing scan finished. Dashboard refreshed.', 'success');
        } else {
          if (!r.ok) {
            const data = await r.json().catch(() => ({}));
            throw new Error(data.detail || 'Generation failed');
          }
          await r.json();
          showToast('Dataset regenerated successfully', 'success');
        }
      setSelected(null);
      loadAll();
    } catch (err) {
      if (err.message !== 'unauthorized') {
        setRegenError(err.message || 'Generation failed');
      }
    } finally {
      generationInFlightRef.current = false;
      setGenerating(false);
    }
  };

  const handleCreateCustomerSubmit = (e) => {
    e.preventDefault();
    if (!auth) return;
    setModalFormError(null);
    setModalFormLoading(true);
    const payload = {
      ...customerForm,
      age: parseInt(customerForm.age, 10),
      declared_income: customerForm.declared_income ? parseFloat(customerForm.declared_income) : null,
      true_monthly_income: customerForm.true_monthly_income ? parseFloat(customerForm.true_monthly_income) : null,
    };
    fetch(`${API_BASE}/api/customers`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${auth.token}` },
      body: JSON.stringify(payload)
    })
      .then(async r => { const d = await r.json(); if (!r.ok) throw new Error(d.detail || 'Failed to create customer'); return d; })
      .then(() => {
        setModalFormLoading(false); setShowCustomerModal(false);
        setCustomerForm({ customer_id: '', name: '', age: 32, city: '', state: '', employment_type: 'Salaried', declared_income: '', true_monthly_income: '', true_loan_type: 'None', persona: 'manual' });
        loadAll(); showToast('Customer created successfully', 'success');
      })
      .catch(err => { setModalFormError(err.message); setModalFormLoading(false); });
  };

  const handleCreateTxnSubmit = (e) => {
    e.preventDefault();
    if (!auth) return;
    setModalFormError(null);
    setModalFormLoading(true);
    const payload = { ...txnForm, amount: parseFloat(txnForm.amount), timestamp: txnForm.timestamp || null };
    fetch(`${API_BASE}/api/transactions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${auth.token}` },
      body: JSON.stringify(payload)
    })
      .then(async r => { const d = await r.json(); if (!r.ok) throw new Error(d.detail || 'Failed to log transaction'); return d; })
      .then(() => {
        setModalFormLoading(false); setShowTxnModal(false);
        setTxnForm({ customer_id: '', type: 'SALARY_CREDIT', amount: '', counterparty: 'Employer Payroll', timestamp: '' });
        loadAll(); showToast('Transaction logged successfully', 'success');
      })
      .catch(err => { setModalFormError(err.message); setModalFormLoading(false); });
  };

  const filtered = useMemo(() => leads.filter(l => {
    if (tierFilter !== 'All' && l.tier !== tierFilter) return false;
    if (search && !(l.name.toLowerCase().includes(search.toLowerCase()) || l.customer_id.toLowerCase().includes(search.toLowerCase()))) return false;
    return true;
  }), [leads, tierFilter, search]);

  const isAdmin = auth?.user?.role === 'admin';
  const canWrite = auth?.user?.role === 'admin' || auth?.user?.role === 'relationship_manager';

  /* ---- Auth screen ---- */
  if (!auth) {
    return (
      <div className="auth-container">
        <div className="auth-card">
          <div className="auth-logo">
            <div className="auth-logo-mark">
              <IconPulse style={{color:'#04141F', width:20, height:20}} />
            </div>
            <p className="auth-title">LENS Engine</p>
          </div>
          <p className="auth-subtitle">
            {usersRegistered === 0
              ? "Welcome! Initialize the platform by registering the primary Administrator account."
              : "Access the RM Lead Console with your authorized credentials."}
          </p>

          <form onSubmit={handleAuthSubmit} id="auth-form">
            {authError && <div className="auth-error">{authError}</div>}

            {authMode === 'register' && (
              <div className="auth-field">
                <label htmlFor="auth-name">Full Name</label>
                <input id="auth-name" type="text" className="auth-input" required
                  placeholder="e.g. Shrinivas Raman"
                  value={authForm.name} onChange={e => setAuthForm({...authForm, name: e.target.value})} />
              </div>
            )}

            <div className="auth-field">
              <label htmlFor="auth-email">Email Address</label>
              <input id="auth-email" type="email" className="auth-input" required
                placeholder="name@idbibank.com"
                value={authForm.email} onChange={e => setAuthForm({...authForm, email: e.target.value})} />
            </div>

            <div className="auth-field">
              <label htmlFor="auth-password">Password</label>
              <input id="auth-password" type="password" className="auth-input" required minLength="8"
                placeholder="••••••••"
                value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} />
            </div>

            {authMode === 'register' && usersRegistered > 0 && (
              <div className="auth-field">
                <label htmlFor="auth-role">Assigned Role</label>
                <select id="auth-role" className="auth-select" value={authForm.role}
                  onChange={e => setAuthForm({...authForm, role: e.target.value})}>
                  <option value="relationship_manager">Relationship Manager</option>
                  <option value="analyst">Analyst (Read-Only)</option>
                  <option value="admin">Administrator</option>
                </select>
              </div>
            )}

            <button id="auth-submit" type="submit" className="btn primary"
              style={{width:'100%', justifyContent:'center', padding:'12px', marginTop:'10px', fontSize:14}}
              disabled={authLoading}>
              {authLoading ? 'Authorizing…' : authMode === 'login' ? 'Sign In' : 'Create Account'}
            </button>
          </form>

          {usersRegistered > 0 && (
            <div className="auth-switch">
              {authMode === 'login' ? (
                <>Need an account? <span id="auth-toggle" onClick={() => { setAuthMode('register'); setAuthForm(prev => ({...prev, role:'relationship_manager'})); }}>Register here</span></>
              ) : (
                <>Already have an account? <span id="auth-toggle" onClick={() => setAuthMode('login')}>Sign in here</span></>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ---- Connection error ---- */
  if (connError) {
    return (
      <div className="loading-screen">
        <IconPulse style={{color:'var(--amber)'}} />
        <div style={{fontFamily:'Space Grotesk', fontSize:18, color:'var(--text-hi)'}}>Can't reach the LENS backend</div>
        <div className="error-banner" style={{margin:0, maxWidth:480}}>
          Expected the API at <code>{API_BASE}</code>. Start it with:<br/>
          <code>cd backend &amp;&amp; uvicorn app:app --reload --port 8000</code><br/>
          Then refresh this page (or pass <code>?api=http://your-host:8000</code> in the URL).
        </div>
        <button className="btn primary" onClick={loadAll}><IconRefresh/> Retry</button>
      </div>
    );
  }

  const tabs = [
    { id: 'leads', label: 'Lead Console', icon: <IconList /> },
    { id: 'compare', label: 'Compare Leads', icon: (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ display: 'block' }}>
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
        <line x1="12" y1="3" x2="12" y2="17" />
        <line x1="12" y1="21" x2="12" y2="21" />
      </svg>
    )},
    { id: 'governance', label: 'Governance', icon: <IconShield /> },
    ...(isAdmin ? [{ id: 'admin', label: 'Admin', icon: <IconAdmin /> }] : []),
  ];

  /* ---- Main app ---- */
  return (
    <div className="app dashboard-bg">
      {/* Sidebar */}
      <div className="sidebar">
        <div className="brand-mark"><IconPulse style={{color:'var(--teal)'}}/></div>
        {tabs.map(t => (
          <div key={t.id} id={`nav-${t.id}`}
            className={`nav-icon ${activeTab===t.id?'active':''}`}
            onClick={() => setActiveTab(t.id)}
            title={t.label}>
            {t.icon}
            <span className="nav-tooltip">{t.label}</span>
          </div>
        ))}
        <div className="sidebar-spacer"></div>
        <div className="nav-icon" onClick={handleLogout} title="Sign Out" style={{color:'var(--red)'}}>
          <IconLogout />
          <span className="nav-tooltip">Sign Out</span>
        </div>
        <div className="sidebar-foot">LENS · IDBI INNOVATE</div>
      </div>

      {/* Main content */}
      <div className="main">
        <div className="topbar">
          <div>
            <h1><IconPulse style={{color:'var(--teal)'}}/> LENS — RM Lead Console</h1>
            <div className="sub">Behavioural intelligence engine · ranked, explainable, real-time leads</div>
          </div>
          <div className="topbar-actions">
            {auth && (
              <span style={{fontSize:13, color:'var(--text-mid)', display:'inline-flex', alignItems:'center', gap:6}}>
                <span style={{
                  background: auth.user.role === 'admin' ? 'var(--amber)' : auth.user.role === 'relationship_manager' ? 'var(--teal)' : 'var(--text-low)',
                  width:8, height:8, borderRadius:'50%', display:'inline-block', flexShrink:0
                }}></span>
                <b>{auth.user.name}</b>
                <span style={{color:'var(--text-low)'}}>({auth.user.role.replace('_',' ')})</span>
              </span>
            )}

            {canWrite && activeTab === 'leads' && (
              <>
                <button id="btn-create-customer" className="btn" onClick={() => { setModalFormError(null); setShowCustomerModal(true); }} style={{borderColor:'var(--teal-dim)'}}>
                  + Create Customer
                </button>
                <button id="btn-add-txn" className="btn" onClick={() => { setModalFormError(null); setShowTxnModal(true); }} style={{borderColor:'var(--teal-dim)'}}>
                  + Add Transaction
                </button>
              </>
            )}

            {activeTab === 'leads' && (
              <button id="btn-regenerate" className="btn primary" onClick={handleRegenerate} disabled={generating || !canWrite}>
                <IconRefresh/> {generating ? 'Scanning…' : 'Regenerate & Rescan'}
              </button>
            )}
          </div>
        </div>

        {regenError && (
          <div className="error-banner" style={{margin: '18px 32px 0 32px', display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
            <span>{regenError}</span>
            <button style={{background:'transparent', border:'none', color:'inherit', cursor:'pointer', fontSize:16}} onClick={() => setRegenError(null)}>&times;</button>
          </div>
        )}

        <ArchitectureFlow />

        {/* Tab content */}
        {activeTab === 'leads' && (
          <LeadsView
            stats={stats} leads={filtered} allLeads={leads} selected={selected} setSelected={setSelected}
            loading={loading} sort={sort} setSort={setSort} tierFilter={tierFilter}
            setTierFilter={setTierFilter} search={search} setSearch={setSearch}
            auth={auth} token={auth.token} onUnauthorized={handleUnauthorized}
            generating={generating} handleRegenerate={handleRegenerate}
            setShowCustomerModal={setShowCustomerModal} setShowTxnModal={setShowTxnModal}
            setModalFormError={setModalFormError}
          />
        )}

        {activeTab === 'compare' && (
          <CompareLeadsWorkspace leads={leads} token={auth?.token} onUnauthorized={handleUnauthorized} />
        )}

        {activeTab === 'governance' && (
          <GovernanceDashboard leads={leads} stats={stats} token={auth?.token} onUnauthorized={handleUnauthorized} />
        )}

        {activeTab === 'admin' && isAdmin && (
          <AdminPanel token={auth.token} onUnauthorized={handleUnauthorized} showToast={showToast} />
        )}
      </div>

      {/* ---------- Create Customer Modal ---------- */}
      {showCustomerModal && (
        <div className="modal-overlay" onClick={() => setShowCustomerModal(false)}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <h3>Create New Customer</h3>
              <button className="modal-close" onClick={() => setShowCustomerModal(false)}>&times;</button>
            </div>
            {modalFormError && <div className="auth-error">{modalFormError}</div>}
            <form onSubmit={handleCreateCustomerSubmit} id="create-customer-form">
              <div className="form-grid">
                <div className="auth-field">
                  <label>Customer ID</label>
                  <input type="text" className="auth-input" required placeholder="e.g. CUST10151"
                    value={customerForm.customer_id} onChange={e => setCustomerForm({...customerForm, customer_id: e.target.value})} />
                </div>
                <div className="auth-field">
                  <label>Full Name</label>
                  <input type="text" className="auth-input" required placeholder="e.g. Rajesh Kumar"
                    value={customerForm.name} onChange={e => setCustomerForm({...customerForm, name: e.target.value})} />
                </div>
                <div className="auth-field">
                  <label>Age</label>
                  <input type="number" className="auth-input" required min="18" max="100"
                    value={customerForm.age} onChange={e => setCustomerForm({...customerForm, age: e.target.value})} />
                </div>
                <div className="auth-field">
                  <label>Employment Type</label>
                  <select className="auth-select" value={customerForm.employment_type}
                    onChange={e => setCustomerForm({...customerForm, employment_type: e.target.value})}>
                    <option value="Salaried">Salaried</option>
                    <option value="Self-Employed">Self-Employed</option>
                    <option value="Gig Worker">Gig Worker</option>
                    <option value="Freelancer">Freelancer</option>
                  </select>
                </div>
                <div className="auth-field">
                  <label>City</label>
                  <input type="text" className="auth-input" required placeholder="e.g. Pune"
                    value={customerForm.city} onChange={e => setCustomerForm({...customerForm, city: e.target.value})} />
                </div>
                <div className="auth-field">
                  <label>State</label>
                  <input type="text" className="auth-input" required placeholder="e.g. Maharashtra"
                    value={customerForm.state} onChange={e => setCustomerForm({...customerForm, state: e.target.value})} />
                </div>
                <div className="auth-field">
                  <label>Declared Monthly Income (₹)</label>
                  <input type="number" className="auth-input" placeholder="e.g. 75000"
                    value={customerForm.declared_income || ''} onChange={e => setCustomerForm({...customerForm, declared_income: e.target.value})} />
                </div>
                <div className="auth-field">
                  <label>Actual Monthly Income (₹)</label>
                  <input type="number" className="auth-input" placeholder="e.g. 80000"
                    value={customerForm.true_monthly_income || ''} onChange={e => setCustomerForm({...customerForm, true_monthly_income: e.target.value})} />
                </div>
                <div className="auth-field form-full">
                  <label>Realized Loan Type (Ground Truth)</label>
                  <select className="auth-select" value={customerForm.true_loan_type}
                    onChange={e => setCustomerForm({...customerForm, true_loan_type: e.target.value})}>
                    <option value="None">None</option>
                    <option value="Personal Loan">Personal Loan</option>
                    <option value="Auto Loan">Auto Loan</option>
                    <option value="Home Loan">Home Loan</option>
                    <option value="Mortgage">Mortgage</option>
                  </select>
                </div>
              </div>
              <div className="form-actions">
                <button type="button" className="btn" onClick={() => setShowCustomerModal(false)}>Cancel</button>
                <button type="submit" className="btn primary" disabled={modalFormLoading}>
                  {modalFormLoading ? 'Creating…' : 'Create Customer'}
                </button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* ---------- Add Transaction Modal ---------- */}
      {showTxnModal && (
        <div className="modal-overlay" onClick={() => setShowTxnModal(false)}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <h3>Log New Transaction</h3>
              <button className="modal-close" onClick={() => setShowTxnModal(false)}>&times;</button>
            </div>
            {modalFormError && <div className="auth-error">{modalFormError}</div>}
            <form onSubmit={handleCreateTxnSubmit} id="create-txn-form">
              <div className="auth-field">
                <label>Target Customer</label>
                <select className="auth-select" required value={txnForm.customer_id}
                  onChange={e => setTxnForm({...txnForm, customer_id: e.target.value})}>
                  <option value="">-- Select Customer --</option>
                  {leads.map(l => (
                    <option key={l.customer_id} value={l.customer_id}>{l.name} ({l.customer_id})</option>
                  ))}
                </select>
              </div>
              <div className="form-grid">
                <div className="auth-field">
                  <label>Transaction Type</label>
                  <select className="auth-select" value={txnForm.type}
                    onChange={e => setTxnForm({...txnForm, type: e.target.value})}>
                    <option value="SALARY_CREDIT">SALARY_CREDIT</option>
                    <option value="UPI_CREDIT">UPI_CREDIT</option>
                    <option value="UPI_DEBIT">UPI_DEBIT</option>
                    <option value="IMPS">IMPS</option>
                    <option value="NEFT">NEFT</option>
                    <option value="EMI_DEBIT">EMI_DEBIT</option>
                    <option value="BILL_PAY">BILL_PAY</option>
                    <option value="WALLET_TOPUP">WALLET_TOPUP</option>
                  </select>
                </div>
                <div className="auth-field">
                  <label>Amount (₹)</label>
                  <input type="number" className="auth-input" required min="1" placeholder="e.g. 5000"
                    value={txnForm.amount} onChange={e => setTxnForm({...txnForm, amount: e.target.value})} />
                </div>
                <div className="auth-field form-full">
                  <label>Counterparty Name</label>
                  <input type="text" className="auth-input" required placeholder="e.g. HDFC Credit Card, Employer Payroll"
                    value={txnForm.counterparty} onChange={e => setTxnForm({...txnForm, counterparty: e.target.value})} />
                </div>
              </div>
              <div className="form-actions">
                <button type="button" className="btn" onClick={() => setShowTxnModal(false)}>Cancel</button>
                <button type="submit" className="btn primary" disabled={modalFormLoading}>
                  {modalFormLoading ? 'Logging…' : 'Log Transaction'}
                </button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* Toast */}
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
