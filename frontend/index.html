<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LENS — RM Lead Console</title>
<meta name="theme-color" content="#f5f5f7">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
:root{
  --bg:#070B14;
  --surface:#0F1626;
  --surface-2:#151E33;
  --surface-3:#1B2640;
  --border:#222F4A;
  --border-soft:#1A2438;
  --teal:#16C2AE;
  --teal-dim:#0E7A6E;
  --amber:#F2870C;
  --amber-dim:#9C5B0A;
  --red:#E5484D;
  --text-hi:#EDF2F9;
  --text-mid:#A9B5CB;
  --text-low:#5C6B87;
  --tier1:#F2870C;
  --tier2:#16C2AE;
  --tier3:#5C6B87;
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text-hi);font-family:var(--font-body);}
body{
  background-image:
    radial-gradient(circle at 15% 0%, rgba(22,194,174,0.07), transparent 40%),
    radial-gradient(circle at 90% 10%, rgba(242,135,12,0.05), transparent 35%);
}
#root{min-height:100vh;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:var(--teal-dim);}

.app{display:grid;grid-template-columns:72px 1fr;min-height:100vh;}

/* ---------- Sidebar ---------- */
.sidebar{
  background:var(--surface);border-right:1px solid var(--border-soft);
  display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:28px;
}
.brand-mark{width:36px;height:36px;display:flex;align-items:center;justify-content:center;}
.nav-icon{
  width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  color:var(--text-low);cursor:pointer;transition:all .15s ease;
}
.nav-icon.active{background:rgba(22,194,174,0.12);color:var(--teal);}
.nav-icon:hover{color:var(--text-hi);}
.sidebar-spacer{flex:1;}
.sidebar-foot{color:var(--text-low);font-size:10px;writing-mode:vertical-rl;letter-spacing:1px;}

/* ---------- Main ---------- */
.main{display:flex;flex-direction:column;min-height:100vh;overflow:hidden;}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:22px 32px 14px 32px;border-bottom:1px solid var(--border-soft);
  flex-wrap:wrap;gap:16px;
}
.topbar h1{
  font-family:var(--font-display);font-size:22px;font-weight:600;margin:0;
  display:flex;align-items:center;gap:10px;letter-spacing:.2px;
}
.topbar .sub{color:var(--text-mid);font-size:13px;margin-top:3px;}
.topbar-actions{display:flex;align-items:center;gap:10px;}

.btn{
  font-family:var(--font-body);font-weight:600;font-size:13px;border:1px solid var(--border);
  background:var(--surface-2);color:var(--text-hi);padding:9px 16px;border-radius:9px;
  cursor:pointer;transition:all .15s ease;display:flex;align-items:center;gap:7px;
}
.btn:hover{border-color:var(--teal-dim);background:var(--surface-3);}
.btn.primary{background:linear-gradient(135deg,var(--teal),var(--teal-dim));border:none;color:#04141F;}
.btn.primary:hover{filter:brightness(1.08);}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* ---------- KPI strip ---------- */
.kpi-strip{
  display:grid;grid-template-columns:repeat(5,1fr);gap:1px;
  background:var(--border-soft);border-bottom:1px solid var(--border-soft);
}
.kpi{
  background:var(--surface);padding:18px 22px;position:relative;overflow:hidden;
}
.kpi .label{font-size:11px;color:var(--text-low);text-transform:uppercase;letter-spacing:.6px;font-weight:600;}
.kpi .value{font-family:var(--font-display);font-size:26px;font-weight:700;margin-top:6px;color:var(--text-hi);}
.kpi .bench{font-size:11px;color:var(--text-low);margin-top:4px;}
.kpi .bench b{color:var(--teal);font-weight:600;}
.kpi-pulse{position:absolute;bottom:0;left:0;right:0;height:26px;opacity:.55;}

/* ---------- Body layout ---------- */
.body-grid{flex:1;display:grid;grid-template-columns:minmax(360px,440px) 1fr;overflow:hidden;}

.queue{display:flex;flex-direction:column;border-right:1px solid var(--border-soft);overflow:hidden;}
.queue-controls{padding:16px 18px 12px;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid var(--border-soft);}
.search-box{
  display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);
  border-radius:9px;padding:8px 12px;
}
.search-box input{
  background:transparent;border:none;outline:none;color:var(--text-hi);font-size:13px;width:100%;font-family:var(--font-body);
}
.search-box input::placeholder{color:var(--text-low);}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;}
.chip{
  font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;border:1px solid var(--border);
  color:var(--text-mid);cursor:pointer;background:var(--surface-2);transition:all .15s;
}
.chip.active{background:rgba(22,194,174,0.14);border-color:var(--teal-dim);color:var(--teal);}
.chip:hover{color:var(--text-hi);}

.queue-list{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}

.lead-card{
  background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:14px 14px 12px;
  cursor:pointer;transition:all .15s ease;position:relative;
}
.lead-card:hover{border-color:var(--teal-dim);transform:translateY(-1px);}
.lead-card.selected{border-color:var(--teal);background:var(--surface-2);box-shadow:0 0 0 1px var(--teal) inset;}
.lead-card-top{display:flex;justify-content:space-between;align-items:flex-start;}
.lead-name{font-weight:600;font-size:14px;color:var(--text-hi);}
.lead-meta{font-size:11.5px;color:var(--text-low);margin-top:2px;font-family:var(--font-mono);}
.tier-badge{
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.4px;white-space:nowrap;
}
.tier-badge.t1{background:rgba(242,135,12,0.16);color:var(--tier1);}
.tier-badge.t2{background:rgba(22,194,174,0.16);color:var(--tier2);}
.tier-badge.t3{background:rgba(92,107,135,0.2);color:#8C9AB5;}

.lead-card-mid{display:flex;align-items:center;gap:10px;margin-top:10px;}
.pulse-mini{flex:1;height:26px;}
.trust-pill{
  font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--teal);
  background:rgba(22,194,174,0.08);border:1px solid var(--border);border-radius:7px;padding:3px 8px;white-space:nowrap;
}
.lead-card-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.loan-chip{
  font-size:11px;font-weight:600;color:var(--text-mid);background:var(--surface-3);
  padding:4px 9px;border-radius:6px;border:1px solid var(--border-soft);
}
.window-tag{font-size:11px;color:var(--text-low);font-family:var(--font-mono);}

/* ---------- Detail panel ---------- */
.detail{overflow-y:auto;padding:28px 36px 60px;}
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;
  color:var(--text-low);gap:14px;padding-top:120px;
}
.empty-state svg{opacity:.4;}
.empty-state .t{font-family:var(--font-display);font-size:16px;color:var(--text-mid);}
.empty-state .s{font-size:13px;max-width:320px;text-align:center;line-height:1.5;}

.detail-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;}
.detail-head h2{font-family:var(--font-display);font-size:24px;margin:0 0 4px;}
.detail-sub{color:var(--text-mid);font-size:13px;font-family:var(--font-mono);}
.score-ring-wrap{display:flex;gap:18px;align-items:center;}

.section-title{
  font-family:var(--font-display);font-size:13px;text-transform:uppercase;letter-spacing:1px;
  color:var(--text-mid);margin:32px 0 14px;display:flex;align-items:center;gap:8px;
}
.section-title .dot{width:6px;height:6px;border-radius:50%;background:var(--teal);}

.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.metric-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:11px;padding:16px;}
.metric-card .l{font-size:11px;color:var(--text-low);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.metric-card .v{font-family:var(--font-display);font-size:20px;margin-top:6px;}
.metric-card .d{font-size:11.5px;color:var(--text-low);margin-top:4px;}

.trigger-list{display:flex;flex-direction:column;gap:8px;}
.trigger-row{
  display:grid;grid-template-columns:1fr 100px 50px;align-items:center;gap:12px;
  background:var(--surface);border:1px solid var(--border-soft);border-radius:9px;padding:10px 14px;
}
.trigger-row .name{font-size:13px;color:var(--text-hi);}
.trigger-bar-track{height:6px;background:var(--surface-3);border-radius:3px;overflow:hidden;}
.trigger-bar-fill{height:100%;background:linear-gradient(90deg,var(--teal-dim),var(--teal));border-radius:3px;}
.trigger-row .w{font-family:var(--font-mono);font-size:12px;color:var(--text-mid);text-align:right;}

.income-panel{
  background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:20px;
  display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center;
}
.income-figure .big{font-family:var(--font-display);font-size:30px;font-weight:700;}
.income-figure .lbl{font-size:11px;color:var(--text-low);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.income-method{font-size:12.5px;color:var(--text-mid);margin-top:8px;line-height:1.5;}
.income-bars{display:flex;flex-direction:column;gap:10px;}
.income-bar-row{display:flex;align-items:center;gap:10px;}
.income-bar-row .ib-label{width:90px;font-size:11.5px;color:var(--text-low);}
.income-bar-track{flex:1;height:18px;background:var(--surface-3);border-radius:5px;overflow:hidden;position:relative;}
.income-bar-fill{height:100%;border-radius:5px;}
.income-bar-row .ib-val{font-family:var(--font-mono);font-size:11.5px;color:var(--text-mid);width:78px;text-align:right;}

.outreach-card{
  background:linear-gradient(135deg,rgba(242,135,12,0.08),rgba(22,194,174,0.05));
  border:1px solid var(--border);border-radius:12px;padding:18px 20px;display:flex;justify-content:space-between;
  align-items:center;flex-wrap:wrap;gap:14px;
}
.outreach-card .chan{font-family:var(--font-display);font-size:18px;font-weight:600;}
.outreach-card .window{font-size:12.5px;color:var(--text-mid);margin-top:4px;font-family:var(--font-mono);}

.txn-table{width:100%;border-collapse:collapse;margin-top:4px;}
.txn-table th{
  text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-low);
  padding:8px 12px;border-bottom:1px solid var(--border-soft);font-weight:600;
}
.txn-table td{padding:9px 12px;font-size:12.5px;border-bottom:1px solid var(--border-soft);color:var(--text-mid);}
.txn-table tr:hover td{background:var(--surface);}
.txn-table .amt{font-family:var(--font-mono);color:var(--text-hi);}
.txn-type-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:var(--surface-3);color:var(--text-mid);}

.loading-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:18px;color:var(--text-mid);
}
.spinner{
  width:34px;height:34px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--teal);
  animation:spin 0.9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.error-banner{
  margin:18px 32px 0;padding:14px 18px;background:rgba(229,72,77,0.08);border:1px solid rgba(229,72,77,0.35);
  border-radius:10px;color:#F2A0A2;font-size:13px;line-height:1.6;
}
.error-banner code{background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:4px;font-family:var(--font-mono);}

@media (max-width:900px){
  .app{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .body-grid{grid-template-columns:1fr;}
  .queue{border-right:none;border-bottom:1px solid var(--border-soft);max-height:48vh;}
  .kpi-strip{grid-template-columns:repeat(2,1fr);}
  .metric-grid{grid-template-columns:1fr;}
  .income-panel{grid-template-columns:1fr;}
}

/* ---------- Auth UI ---------- */
.auth-container {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  background: var(--bg);
  background-image:
    radial-gradient(circle at 50% 30%, rgba(22,194,174,0.12), transparent 50%),
    radial-gradient(circle at 50% 70%, rgba(242,135,12,0.06), transparent 45%);
}
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%;
  max-width: 400px;
  padding: 36px 32px;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
}
.auth-title {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 600;
  color: var(--text-hi);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.auth-subtitle {
  font-size: 13px;
  color: var(--text-mid);
  margin-bottom: 24px;
  line-height: 1.4;
}
.auth-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 18px;
}
.auth-field label {
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-low);
}
.auth-input {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text-hi);
  font-family: var(--font-body);
  font-size: 14px;
  transition: border-color 0.15s ease;
  width: 100%;
}
.auth-input:focus {
  border-color: var(--teal);
  outline: none;
}
.auth-select {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text-hi);
  font-family: var(--font-body);
  font-size: 14px;
  width: 100%;
}
.auth-select:focus {
  border-color: var(--teal);
  outline: none;
}
.auth-error {
  background: rgba(229,72,77,0.08);
  border: 1px solid rgba(229,72,77,0.35);
  border-radius: 8px;
  color: #F2A0A2;
  font-size: 12.5px;
  padding: 10px 14px;
  margin-bottom: 18px;
  line-height: 1.4;
}
.auth-switch {
  text-align: center;
  font-size: 13px;
  color: var(--text-mid);
  margin-top: 20px;
}
.auth-switch span {
  color: var(--teal);
  cursor: pointer;
  font-weight: 500;
}
.auth-switch span:hover {
  text-decoration: underline;
}

/* ---------- Modal Dialogs ---------- */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(4, 7, 14, 0.7);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.2s ease-out;
}
.modal-content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%;
  max-width: 500px;
  padding: 30px;
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
  animation: scaleIn 0.2s ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes scaleIn {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 22px;
}
.modal-header h3 {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  margin: 0;
  color: var(--text-hi);
}
.modal-close {
  background: transparent;
  border: none;
  color: var(--text-low);
  font-size: 22px;
  cursor: pointer;
  padding: 0;
  line-height: 1;
}
.modal-close:hover {
  color: var(--text-hi);
}
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.form-full {
  grid-column: span 2;
}
.form-actions {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  margin-top: 24px;
}
</style>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const {useState, useEffect, useMemo, useCallback} = React;

const API_BASE = (() => {
  const params = new URLSearchParams(window.location.search);
  if (params.get('api')) return params.get('api');
  if (window.location.port === '5500') return 'http://localhost:8000';
  return window.location.origin;
})();
const storageKey = 'lens_auth';
const emptyCustomer = {
  customer_id:'', name:'', age:32, city:'', state:'', employment_type:'Salaried',
  declared_income:'', true_monthly_income:'', true_loan_type:'None', persona:'manual'
};
const emptyTxn = {customer_id:'', type:'SALARY_CREDIT', amount:'', counterparty:'Employer Payroll', timestamp:''};

const TIER_COLORS = {'Tier 1': 'var(--tier1)', 'Tier 2': 'var(--tier2)', 'Tier 3': 'var(--tier3)'};

function fmtINR(n) {
  if (n === null || n === undefined) return '—';
  return '₹' + Number(n).toLocaleString('en-IN', {maximumFractionDigits: 0});
}

function fmtRelTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const diffH = (Date.now() - d.getTime()) / 36e5;
  if (diffH < 1) return Math.round(diffH * 60) + 'm ago';
  if (diffH < 24) return Math.round(diffH) + 'h ago';
  return Math.round(diffH / 24) + 'd ago';
}

function fmtWindowEnd(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const diffH = (d.getTime() - Date.now()) / 36e5;
  if (diffH < 0) return 'window closed';
  return 'closes in ' + Math.max(1, Math.round(diffH)) + 'h';
}

/* ---------- Pulse waveform SVG (the signature element) ---------- */
function PulseLine({intensity = 50, color = 'var(--teal)', width = 200, height = 26, animate = true, id}) {
  // Generates an ECG-style waveform whose spike height scales with `intensity`
  const w = width, h = height, mid = h / 2;
  const segs = 6;
  const segW = w / segs;
  let d = `M0,${mid}`;
  const spikeIdx = Math.floor(segs / 2);
  for (let i = 0; i < segs; i++) {
    const x0 = i * segW;
    if (i === spikeIdx) {
      const peak = mid - (h * 0.42) * (intensity / 100);
      const trough = mid + (h * 0.22) * (intensity / 100);
      d += ` L${x0 + segW * 0.18},${mid} L${x0 + segW * 0.34},${peak} L${x0 + segW * 0.5},${trough} L${x0 + segW * 0.66},${mid - h*0.08} L${x0+segW*0.82},${mid}`;
    } else {
      d += ` L${x0 + segW * 0.5},${mid + (Math.sin(i) * h * 0.05)}`;
    }
    d += ` L${x0 + segW},${mid}`;
  }
  const gradId = 'pg-' + (id || Math.random().toString(36).slice(2));
  return (
    <svg width={width} height={height} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{display:'block'}}>
      <defs>
        <linearGradient id={gradId} x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor={color} stopOpacity="0.05" />
          <stop offset="50%" stopColor={color} stopOpacity="1" />
          <stop offset="100%" stopColor={color} stopOpacity="0.05" />
        </linearGradient>
      </defs>
      <path d={d} fill="none" stroke={`url(#${gradId})`} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round">
        {animate && <animate attributeName="stroke-dashoffset" from="220" to="0" dur="1.4s" begin="0s" />}
      </path>
    </svg>
  );
}

function ScoreRing({value, label, size = 92, color = 'var(--teal)'}) {
  const r = (size - 10) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (value / 100) * c;
  return (
    <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:6}}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} stroke="var(--surface-3)" strokeWidth="7" fill="none" />
        <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth="7" fill="none"
          strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round"
          transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:'stroke-dashoffset .6s ease'}} />
        <text x="50%" y="48%" textAnchor="middle" fill="var(--text-hi)" fontFamily="Space Grotesk" fontSize="20" fontWeight="700">{Math.round(value)}</text>
        <text x="50%" y="66%" textAnchor="middle" fill="var(--text-low)" fontFamily="Inter" fontSize="9">/ 100</text>
      </svg>
      <div style={{fontSize:11, color:'var(--text-low)', textTransform:'uppercase', letterSpacing:'.5px', fontWeight:600}}>{label}</div>
    </div>
  );
}

/* ---------- Icons (inline, no external icon dependency) ---------- */

const IconUser = (p) => <svg {...p} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;

const IconSearch = (p) => <svg {...p} width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
const IconEmpty = (p) => <svg {...p} width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><polyline points="2 12 7 12 9 18 14 6 16 12 22 12"/></svg>;

/* ---------- KPI strip ---------- */
function KPIStrip({stats}) {
  if (!stats) return null;
  const conv = stats.lead_conversion_rate_pct;
  const bench = stats.industry_benchmark;
  const items = [
    {label: 'Active Leads', value: stats.total_leads, bench: `from ${stats.total_customers} customers scanned`},
    {label: 'Conversion Rate', value: conv + '%', bench: <>vs <b>{bench.lead_conversion_rate_pct}%</b> industry avg</>},
    {label: 'Avg. Time to Lead', value: stats.avg_hours_to_lead + 'h', bench: <>vs <b>{bench.time_to_lead_hours}h</b> batch cycle</>},
    {label: 'Income Accuracy', value: '±' + stats.avg_income_deviation_pct + '%', bench: 'non-salaried, vs actual'},
    {label: 'Loan-Type Match', value: stats.loan_type_accuracy_pct + '%', bench: 'predicted vs realized'},
  ];
  return (
    <div className="kpi-strip">
      {items.map((it, i) => (
        <div className="kpi" key={i}>
          <div className="label">{it.label}</div>
          <div className="value">{it.value}</div>
          <div className="bench">{it.bench}</div>
          <div className="kpi-pulse"><PulseLine intensity={40 + i * 11} width={300} height={26} id={'kpi'+i} animate={false} /></div>
        </div>
      ))}
    </div>
  );
}

/* ---------- Lead card ---------- */
function LeadCard({lead, selected, onClick}) {
  const tierClass = lead.tier === 'Tier 1' ? 't1' : lead.tier === 'Tier 2' ? 't2' : 't3';
  return (
    <div className={`lead-card ${selected ? 'selected' : ''}`} onClick={onClick}>
      <div className="lead-card-top">
        <div>
          <div className="lead-name">{lead.name}</div>
          <div className="lead-meta">{lead.customer_id} · {lead.employment_type} · {lead.city}</div>
        </div>
        <span className={`tier-badge ${tierClass}`}>{lead.tier.toUpperCase()}</span>
      </div>
      <div className="lead-card-mid">
        <div className="pulse-mini">
          <PulseLine intensity={lead.intent_score} color={TIER_COLORS[lead.tier]} width={220} height={26} id={lead.customer_id} />
        </div>
        <div className="trust-pill">{lead.trust_score}</div>
      </div>
      <div className="lead-card-bottom">
        <span className="loan-chip">{lead.predicted_loan_type}</span>
        <span className="window-tag">{fmtWindowEnd(lead.outreach_window_end)}</span>
      </div>
    </div>
  );
}

/* ---------- Detail panel ---------- */
function DetailPanel({customerId, token, onUnauthorized}) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);

  useEffect(() => {
    if (!customerId || !token) return;
    setLoading(true); setErr(null);
    fetch(`${API_BASE}/api/leads/${customerId}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    })
      .then(r => { 
        if (r.status === 401) { onUnauthorized(); throw new Error('Session expired'); }
        if (!r.ok) throw new Error('Failed to load lead'); 
        return r.json(); 
      })
      .then(d => { setData(d); setLoading(false); })
      .catch(e => { setErr(e.message); setLoading(false); });
  }, [customerId, token, onUnauthorized]);

  if (!customerId) {
    return (
      <div className="empty-state">
        <IconEmpty />
        <div className="t">Select a lead to inspect the signal</div>
        <div className="s">Every lead card carries a full behavioural trail — triggers fired, reconstructed income, and the recommended outreach window — so an RM can act without guessing why.</div>
      </div>
    );
  }
  if (loading || !data) return <div className="empty-state"><div className="spinner"></div></div>;
  if (err) return <div className="error-banner">{err}</div>;

  const {customer, lead, transactions, income_breakdown} = data;
  if (!lead) {
    return (
      <div className="empty-state">
        <IconEmpty />
        <div className="t">{customer.name} did not clear the lead threshold</div>
        <div className="s">No qualifying behavioural triggers were detected in this customer's transaction history.</div>
      </div>
    );
  }

  const maxTriggerW = Math.max(...lead.triggers_fired.map(t => Math.abs(t.weight)), 1);

  return (
    <div>
      <div className="detail-head">
        <div>
          <h2>{customer.name}</h2>
          <div className="detail-sub">{customer.customer_id} · {customer.age} yrs · {customer.employment_type} · {customer.city}, {customer.state}</div>
        </div>
        <div className="score-ring-wrap">
          <ScoreRing value={lead.intent_score} label="Intent" color="var(--amber)" />
          <ScoreRing value={lead.trust_score} label="Trust" color="var(--teal)" />
        </div>
      </div>

      <div className="metric-grid" style={{marginTop: 24}}>
        <div className="metric-card">
          <div className="l">Predicted Loan Type</div>
          <div className="v">{lead.predicted_loan_type}</div>
          <div className="d">Lead Tier — {lead.tier}</div>
        </div>
        <div className="metric-card">
          <div className="l">Signal → Lead Card</div>
          <div className="v">{lead.hours_to_lead}h</div>
          <div className="d">detected {fmtRelTime(lead.signal_detected_at)}</div>
        </div>
        <div className="metric-card">
          <div className="l">Synthetic Monthly Income</div>
          <div className="v">{fmtINR(lead.synthetic_income)}</div>
          <div className="d">{lead.income_accuracy_pct != null ? `±${lead.income_accuracy_pct}% vs ground truth` : '—'}</div>
        </div>
      </div>

      <div className="section-title"><span className="dot"></span>PULSE — Behavioural Triggers Fired</div>
      <div className="trigger-list">
        {lead.triggers_fired.map(t => (
          <div className="trigger-row" key={t.code}>
            <div className="name">{t.label}</div>
            <div className="trigger-bar-track">
              <div className="trigger-bar-fill" style={{width: `${Math.max(8, Math.abs(t.weight)/maxTriggerW*100)}%`, background: t.weight < 0 ? 'var(--red)' : undefined}}></div>
            </div>
            <div className="w">{t.weight > 0 ? '+' : ''}{t.weight}</div>
          </div>
        ))}
      </div>

      <div className="section-title"><span className="dot"></span>CLARITY — Income Reconstruction</div>
      <div className="income-panel">
        <div className="income-figure">
          <div className="lbl">Synthetic Monthly Income</div>
          <div className="big">{fmtINR(income_breakdown.synthetic_monthly_income)}</div>
          <div className="income-method">{income_breakdown.method}</div>
        </div>
        <div className="income-bars">
          <div className="income-bar-row">
            <div className="ib-label">Declared</div>
            <div className="income-bar-track">
              <div className="income-bar-fill" style={{width: customer.declared_income ? '100%' : '0%', background:'var(--text-low)'}}></div>
            </div>
            <div className="ib-val">{customer.declared_income ? fmtINR(customer.declared_income) : 'None filed'}</div>
          </div>
          <div className="income-bar-row">
            <div className="ib-label">LENS estimate</div>
            <div className="income-bar-track">
              <div className="income-bar-fill" style={{width: '100%', background:'linear-gradient(90deg,var(--teal-dim),var(--teal))'}}></div>
            </div>
            <div className="ib-val">{fmtINR(income_breakdown.synthetic_monthly_income)}</div>
          </div>
        </div>
      </div>

      <div className="section-title"><span className="dot"></span>MOMENT — Recommended Outreach</div>
      <div className="outreach-card">
        <div>
          <div className="chan">{lead.outreach_channel}</div>
          <div className="window">{fmtWindowEnd(lead.outreach_window_end)} · window opened {fmtRelTime(lead.outreach_window_start)}</div>
        </div>
        <div className="loan-chip" style={{fontSize:12, padding:'7px 14px'}}>MATCH confidence: behaviour-derived</div>
      </div>

      <div className="section-title"><span className="dot"></span>Recent Transaction Stream ({transactions.length} total)</div>
      <table className="txn-table">
        <thead>
          <tr><th>Date</th><th>Type</th><th>Counterparty</th><th style={{textAlign:'right'}}>Amount</th></tr>
        </thead>
        <tbody>
          {transactions.slice(0, 18).map(t => (
            <tr key={t.txn_id}>
              <td>{new Date(t.timestamp).toLocaleDateString('en-IN', {day:'2-digit', month:'short'})}</td>
              <td><span className="txn-type-tag">{t.type.replace('_',' ')}</span></td>
              <td>{t.counterparty}</td>
              <td className="amt" style={{textAlign:'right'}}>{fmtINR(t.amount)}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

/* ---------- App ---------- */
function App() {
  const [auth, setAuth] = useState(() => {
    try {
      const stored = localStorage.getItem(storageKey);
      return stored ? JSON.parse(stored) : null;
    } catch (e) {
      return null;
    }
  });

  const [stats, setStats] = useState(null);
  const [leads, setLeads] = useState([]);
  const [selected, setSelected] = useState(null);
  const [tierFilter, setTierFilter] = useState('All');
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState('trust_score');
  const [loading, setLoading] = useState(true);
  const [generating, setGenerating] = useState(false);
  const [connError, setConnError] = useState(null);

  const [usersRegistered, setUsersRegistered] = useState(0);
  const [authMode, setAuthMode] = useState('login'); 
  const [authForm, setAuthForm] = useState({ name: '', email: '', password: '', role: 'relationship_manager' });
  const [authError, setAuthError] = useState(null);
  const [authLoading, setAuthLoading] = useState(false);

  // --- Modals State ---
  const [showCustomerModal, setShowCustomerModal] = useState(false);
  const [showTxnModal, setShowTxnModal] = useState(false);
  const [modalFormError, setModalFormError] = useState(null);
  const [modalFormLoading, setModalFormLoading] = useState(false);

  const [customerForm, setCustomerForm] = useState({
    customer_id: '', name: '', age: 32, city: '', state: '', employment_type: 'Salaried',
    declared_income: '', true_monthly_income: '', true_loan_type: 'None', persona: 'manual'
  });
  
  const [txnForm, setTxnForm] = useState({
    customer_id: '', type: 'SALARY_CREDIT', amount: '', counterparty: 'Employer Payroll', timestamp: ''
  });

  const handleCreateCustomerSubmit = (e) => {
    e.preventDefault();
    if (!auth) return;
    setModalFormError(null);
    setModalFormLoading(true);

    const payload = {
      ...customerForm,
      age: parseInt(customerForm.age, 10),
      declared_income: customerForm.declared_income ? parseFloat(customerForm.declared_income) : null,
      true_monthly_income: customerForm.true_monthly_income ? parseFloat(customerForm.true_monthly_income) : null,
    };

    fetch(`${API_BASE}/api/customers`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${auth.token}`
      },
      body: JSON.stringify(payload)
    })
      .then(async r => {
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || 'Failed to create customer');
        return d;
      })
      .then((d) => {
        setModalFormLoading(false);
        setShowCustomerModal(false);
        setCustomerForm({
          customer_id: '', name: '', age: 32, city: '', state: '', employment_type: 'Salaried',
          declared_income: '', true_monthly_income: '', true_loan_type: 'None', persona: 'manual'
        });
        loadAll();
      })
      .catch(err => {
        setModalFormError(err.message);
        setModalFormLoading(false);
      });
  };

  const handleCreateTxnSubmit = (e) => {
    e.preventDefault();
    if (!auth) return;
    setModalFormError(null);
    setModalFormLoading(true);

    const payload = {
      ...txnForm,
      amount: parseFloat(txnForm.amount),
      timestamp: txnForm.timestamp || null
    };

    fetch(`${API_BASE}/api/transactions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${auth.token}`
      },
      body: JSON.stringify(payload)
    })
      .then(async r => {
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || 'Failed to log transaction');
        return d;
      })
      .then((d) => {
        setModalFormLoading(false);
        setShowTxnModal(false);
        setTxnForm({
          customer_id: '', type: 'SALARY_CREDIT', amount: '', counterparty: 'Employer Payroll', timestamp: ''
        });
        loadAll();
      })
      .catch(err => {
        setModalFormError(err.message);
        setModalFormLoading(false);
      });
  };

  const handleUnauthorized = useCallback(() => {
    setAuth(null);
    localStorage.removeItem(storageKey);
  }, []);

  const checkUsers = useCallback(() => {
    fetch(`${API_BASE}/api/health`)
      .then(r => r.json())
      .then(d => {
        setUsersRegistered(d.users_registered || 0);
        if (d.users_registered === 0) {
          setAuthMode('register');
          setAuthForm(prev => ({ ...prev, role: 'admin' }));
        }
      })
      .catch(() => {});
  }, []);

  useEffect(() => {
    checkUsers();
  }, [auth, checkUsers]);

  const loadAll = useCallback(() => {
    if (!auth) return;
    setLoading(true); setConnError(null);
    Promise.all([
      fetch(`${API_BASE}/api/stats`, {
        headers: { 'Authorization': `Bearer ${auth.token}` }
      }).then(r => { 
        if (r.status === 401) { handleUnauthorized(); throw new Error('unauthorized'); }
        if (!r.ok) throw new Error('stats'); 
        return r.json(); 
      }),
      fetch(`${API_BASE}/api/leads?sort=${sort}&limit=200`, {
        headers: { 'Authorization': `Bearer ${auth.token}` }
      }).then(r => { 
        if (r.status === 401) { handleUnauthorized(); throw new Error('unauthorized'); }
        if (!r.ok) throw new Error('leads'); 
        return r.json(); 
      }),
    ]).then(([s, l]) => { setStats(s); setLeads(l); setLoading(false); if (l.length) setSelected(prev => prev || l[0].customer_id); })
      .catch((e) => { 
        if (e.message !== 'unauthorized') {
          setConnError(true); 
        }
        setLoading(false); 
      });
  }, [sort, auth, handleUnauthorized]);

  useEffect(() => { 
    if (auth) {
      loadAll(); 
    }
  }, [loadAll, auth]);

  const handleAuthSubmit = (e) => {
    e.preventDefault();
    setAuthError(null);
    setAuthLoading(true);

    const url = authMode === 'login' ? `${API_BASE}/api/auth/login` : `${API_BASE}/api/auth/register`;
    const payload = authMode === 'login'
      ? { email: authForm.email, password: authForm.password }
      : { name: authForm.name, email: authForm.email, password: authForm.password, role: authForm.role };

    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
      .then(async r => {
        const data = await r.json();
        if (!r.ok) {
          throw new Error(data.detail || 'Authentication failed');
        }
        return data;
      })
      .then(d => {
        const newAuth = { token: d.token, user: d.user };
        setAuth(newAuth);
        localStorage.setItem(storageKey, JSON.stringify(newAuth));
        setAuthLoading(false);
      })
      .catch(err => {
        setAuthError(err.message);
        setAuthLoading(false);
      });
  };

  const handleLogout = () => {
    if (!auth) return;
    fetch(`${API_BASE}/api/auth/logout`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${auth.token}` }
    })
      .finally(() => {
        setAuth(null);
        localStorage.removeItem(storageKey);
        setSelected(null);
        setLeads([]);
        setStats(null);
      });
  };

  const handleRegenerate = () => {
    if (!auth) return;
    setGenerating(true);
    fetch(`${API_BASE}/api/generate?n_customers=150`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${auth.token}` }
    })
      .then(r => {
        if (r.status === 401) { handleUnauthorized(); throw new Error('unauthorized'); }
        return r.json();
      })
      .then(() => { setGenerating(false); setSelected(null); loadAll(); })
      .catch(() => setGenerating(false));
  };

  const filtered = useMemo(() => {
    return leads.filter(l => {
      if (tierFilter !== 'All' && l.tier !== tierFilter) return false;
      if (search && !(l.name.toLowerCase().includes(search.toLowerCase()) || l.customer_id.toLowerCase().includes(search.toLowerCase()))) return false;
      return true;
    });
  }, [leads, tierFilter, search]);

  if (!auth) {
    return (
      <div className="auth-container">
        <div className="auth-card">
          <div className="auth-title">
            <IconPulse style={{color:'var(--teal)'}} /> LENS Engine
          </div>
          <div className="auth-subtitle">
            {usersRegistered === 0 
              ? "Welcome! Initialize the system by registering the primary Administrator account." 
              : "Access the RM Lead Console with your authorized credentials."}
          </div>
          
          <form onSubmit={handleAuthSubmit}>
            {authError && <div className="auth-error">{authError}</div>}
            
            {authMode === 'register' && (
              <div className="auth-field">
                <label>Full Name</label>
                <input 
                  type="text" 
                  className="auth-input"
                  required
                  placeholder="e.g. Shrinivas Raman"
                  value={authForm.name} 
                  onChange={e => setAuthForm({...authForm, name: e.target.value})}
                />
              </div>
            )}
            
            <div className="auth-field">
              <label>Email Address</label>
              <input 
                type="email" 
                className="auth-input" 
                required
                placeholder="name@idbibank.com"
                value={authForm.email} 
                onChange={e => setAuthForm({...authForm, email: e.target.value})}
              />
            </div>
            
            <div className="auth-field">
              <label>Password</label>
              <input 
                type="password" 
                className="auth-input" 
                required
                minLength="8"
                placeholder="••••••••"
                value={authForm.password} 
                onChange={e => setAuthForm({...authForm, password: e.target.value})}
              />
            </div>
            
            {authMode === 'register' && usersRegistered > 0 && (
              <div className="auth-field">
                <label>Assigned Role</label>
                <select 
                  className="auth-select"
                  value={authForm.role} 
                  onChange={e => setAuthForm({...authForm, role: e.target.value})}
                >
                  <option value="relationship_manager">Relationship Manager</option>
                  <option value="analyst">Analyst</option>
                  <option value="admin">Administrator</option>
                </select>
              </div>
            )}
            
            <button 
              type="submit" 
              className="btn primary" 
              style={{width: '100%', justifyContent: 'center', padding: '11px', marginTop: '10px'}}
              disabled={authLoading}
            >
              {authLoading ? 'Authorizing...' : authMode === 'login' ? 'Sign In' : 'Create Account'}
            </button>
          </form>
          
          {usersRegistered > 0 && (
            <div className="auth-switch">
              {authMode === 'login' ? (
                <>Need an account? <span onClick={() => { setAuthMode('register'); setAuthForm(prev => ({ ...prev, role: 'relationship_manager' })); }}>Register here</span></>
              ) : (
                <>Already have an account? <span onClick={() => setAuthMode('login')}>Sign in here</span></>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }

  if (connError) {
    return (
      <div className="loading-screen">
        <IconPulse style={{color:'var(--amber)'}} />
        <div style={{fontFamily:'Space Grotesk', fontSize:18, color:'var(--text-hi)'}}>Can't reach the LENS backend</div>
        <div className="error-banner" style={{margin:0, maxWidth:480}}>
          Expected the API at <code>{API_BASE}</code>. Start it with:<br/>
          <code>cd backend && uvicorn app:app --reload --port 8000</code><br/>
          Then refresh this page (or pass <code>?api=http://your-host:8000</code> in the URL).
        </div>
        <button className="btn primary" onClick={loadAll}><IconRefresh/> Retry</button>
      </div>
    );
  }

  return (
    <div className="app">
      <div className="sidebar">
        <div className="brand-mark"><IconPulse style={{color:'var(--teal)'}} /></div>
        <div className="nav-icon active"><IconList/></div>
        <div className="nav-icon"><IconUser/></div>
        <div className="sidebar-spacer"></div>
        {auth && (
          <div className="nav-icon" onClick={handleLogout} title="Sign Out" style={{color: 'var(--red)', marginBottom: 12}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
          </div>
        )}
        <div className="sidebar-foot">LENS · IDBI INNOVATE</div>
      </div>

      <div className="main">
        <div className="topbar">
          <div>
            <h1><IconPulse style={{color:'var(--teal)'}}/> LENS — RM Lead Console</h1>
            <div className="sub">Behavioural intelligence engine · ranked, explainable, real-time leads</div>
          </div>
          <div className="topbar-actions">
            {auth && (
              <span style={{fontSize: 13, color: 'var(--text-mid)', marginRight: 12, display: 'inline-flex', alignItems: 'center', gap: 6}}>
                <span className="dot" style={{background: auth.user.role === 'admin' ? 'var(--amber)' : auth.user.role === 'relationship_manager' ? 'var(--teal)' : 'var(--text-low)', width: 8, height: 8, borderRadius: '50%', display: 'inline-block'}}></span>
                <b>{auth.user.name}</b> ({auth.user.role.toUpperCase().replace('_', ' ')})
              </span>
            )}
            
            {auth && (auth.user.role === 'admin' || auth.user.role === 'relationship_manager') ? (
              <>
                <button className="btn" onClick={() => { setModalFormError(null); setShowCustomerModal(true); }} style={{borderColor: 'var(--teal-dim)'}}>
                  + Create Customer
                </button>
                <button className="btn" onClick={() => { setModalFormError(null); setShowTxnModal(true); }} style={{borderColor: 'var(--teal-dim)'}}>
                  + Add Transaction
                </button>
              </>
            ) : (
              <span style={{fontSize: 12, color: 'var(--text-low)', fontStyle: 'italic', marginRight: 12}}>
                Read-Only Console
              </span>
            )}

            <button className="btn primary" onClick={handleRegenerate} disabled={generating || (auth && auth.user.role === 'analyst')}>
              <IconRefresh/> {generating ? 'Scanning transactions…' : 'Regenerate dataset & rescan'}
            </button>
          </div>
        </div>

        <KPIStrip stats={stats} />

        <div className="body-grid">
          <div className="queue">
            <div className="queue-controls">
              <div className="search-box">
                <IconSearch style={{color:'var(--text-low)'}}/>
                <input placeholder="Search by name or customer ID…" value={search} onChange={e=>setSearch(e.target.value)} />
              </div>
              <div className="filter-row">
                {['All','Tier 1','Tier 2','Tier 3'].map(t => (
                  <div key={t} className={`chip ${tierFilter===t?'active':''}`} onClick={()=>setTierFilter(t)}>{t}</div>
                ))}
                <select value={sort} onChange={e=>setSort(e.target.value)}
                  style={{marginLeft:'auto', background:'var(--surface-2)', color:'var(--text-mid)', border:'1px solid var(--border)', borderRadius:8, fontSize:12, padding:'6px 8px'}}>
                  <option value="trust_score">Sort: Trust Score</option>
                  <option value="intent_score">Sort: Intent Score</option>
                  <option value="hours_to_lead">Sort: Time to Lead</option>
                </select>
              </div>
            </div>
            <div className="queue-list">
              {loading ? <div style={{padding:30, textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}}></div></div> :
                filtered.length === 0 ? <div style={{padding:30, textAlign:'center', color:'var(--text-low)', fontSize:13}}>No leads match this filter.</div> :
                filtered.map(l => (
                  <LeadCard key={l.customer_id} lead={l} selected={selected===l.customer_id} onClick={()=>setSelected(l.customer_id)} />
                ))
              }
            </div>
          </div>
          <div className="detail">
            <DetailPanel customerId={selected} token={auth?.token} onUnauthorized={handleUnauthorized} />
          </div>
        </div>
      </div>

      {/* ---------- Create Customer Modal ---------- */}
      {showCustomerModal && (
        <div className="modal-overlay" onClick={() => setShowCustomerModal(false)}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <h3>Create New Customer</h3>
              <button className="modal-close" onClick={() => setShowCustomerModal(false)}>&times;</button>
            </div>
            
            {modalFormError && <div className="auth-error">{modalFormError}</div>}
            
            <form onSubmit={handleCreateCustomerSubmit}>
              <div className="form-grid">
                <div className="auth-field">
                  <label>Customer ID</label>
                  <input 
                    type="text" 
                    className="auth-input" 
                    required 
                    placeholder="e.g. CUST10151" 
                    value={customerForm.customer_id}
                    onChange={e => setCustomerForm({...customerForm, customer_id: e.target.value})}
                  />
                </div>
                
                <div className="auth-field">
                  <label>Full Name</label>
                  <input 
                    type="text" 
                    className="auth-input" 
                    required 
                    placeholder="e.g. Rajesh Kumar" 
                    value={customerForm.name}
                    onChange={e => setCustomerForm({...customerForm, name: e.target.value})}
                  />
                </div>
                
                <div className="auth-field">
                  <label>Age</label>
                  <input 
                    type="number" 
                    className="auth-input" 
                    required 
                    min="18" max="100"
                    value={customerForm.age}
                    onChange={e => setCustomerForm({...customerForm, age: e.target.value})}
                  />
                </div>
                
                <div className="auth-field">
                  <label>Employment Type</label>
                  <select 
                    className="auth-select"
                    value={customerForm.employment_type}
                    onChange={e => setCustomerForm({...customerForm, employment_type: e.target.value})}
                  >
                    <option value="Salaried">Salaried</option>
                    <option value="Self-Employed">Self-Employed</option>
                    <option value="Gig Worker">Gig Worker</option>
                    <option value="Freelancer">Freelancer</option>
                  </select>
                </div>
                
                <div className="auth-field">
                  <label>City</label>
                  <input 
                    type="text" 
                    className="auth-input" 
                    required 
                    placeholder="e.g. Pune" 
                    value={customerForm.city}
                    onChange={e => setCustomerForm({...customerForm, city: e.target.value})}
                  />
                </div>
                
                <div className="auth-field">
                  <label>State</label>
                  <input 
                    type="text" 
                    className="auth-input" 
                    required 
                    placeholder="e.g. Maharashtra" 
                    value={customerForm.state}
                    onChange={e => setCustomerForm({...customerForm, state: e.target.value})}
                  />
                </div>
                
                <div className="auth-field">
                  <label>Declared Monthly Income (₹)</label>
                  <input 
                    type="number" 
                    className="auth-input" 
                    placeholder="e.g. 75000" 
                    value={customerForm.declared_income || ''}
                    onChange={e => setCustomerForm({...customerForm, declared_income: e.target.value})}
                  />
                </div>
                
                <div className="auth-field">
                  <label>Actual Monthly Income (₹)</label>
                  <input 
                    type="number" 
                    className="auth-input" 
                    placeholder="e.g. 80000" 
                    value={customerForm.true_monthly_income || ''}
                    onChange={e => setCustomerForm({...customerForm, true_monthly_income: e.target.value})}
                  />
                </div>
                
                <div className="auth-field form-full">
                  <label>Realized Loan Type (Ground Truth)</label>
                  <select 
                    className="auth-select"
                    value={customerForm.true_loan_type}
                    onChange={e => setCustomerForm({...customerForm, true_loan_type: e.target.value})}
                  >
                    <option value="None">None</option>
                    <option value="Personal Loan">Personal Loan</option>
                    <option value="Auto Loan">Auto Loan</option>
                    <option value="Home Loan">Home Loan</option>
                    <option value="Mortgage">Mortgage</option>
                  </select>
                </div>
              </div>
              
              <div className="form-actions">
                <button type="button" className="btn" onClick={() => setShowCustomerModal(false)}>Cancel</button>
                <button type="submit" className="btn primary" disabled={modalFormLoading}>
                  {modalFormLoading ? 'Creating...' : 'Create Customer'}
                </button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* ---------- Add Transaction Modal ---------- */}
      {showTxnModal && (
        <div className="modal-overlay" onClick={() => setShowTxnModal(false)}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <h3>Log New Transaction</h3>
              <button className="modal-close" onClick={() => setShowTxnModal(false)}>&times;</button>
            </div>
            
            {modalFormError && <div className="auth-error">{modalFormError}</div>}
            
            <form onSubmit={handleCreateTxnSubmit}>
              <div className="auth-field">
                <label>Target Customer</label>
                <select 
                  className="auth-select"
                  required
                  value={txnForm.customer_id}
                  onChange={e => setTxnForm({...txnForm, customer_id: e.target.value})}
                >
                  <option value="">-- Select Customer --</option>
                  {leads.map(l => (
                    <option key={l.customer_id} value={l.customer_id}>{l.name} ({l.customer_id})</option>
                  ))}
                </select>
              </div>
              
              <div className="form-grid">
                <div className="auth-field">
                  <label>Transaction Type</label>
                  <select 
                    className="auth-select"
                    value={txnForm.type}
                    onChange={e => setTxnForm({...txnForm, type: e.target.value})}
                  >
                    <option value="SALARY_CREDIT">SALARY_CREDIT</option>
                    <option value="UPI_CREDIT">UPI_CREDIT</option>
                    <option value="UPI_DEBIT">UPI_DEBIT</option>
                    <option value="IMPS">IMPS</option>
                    <option value="NEFT">NEFT</option>
                    <option value="EMI_DEBIT">EMI_DEBIT</option>
                    <option value="BILL_PAY">BILL_PAY</option>
                    <option value="WALLET_TOPUP">WALLET_TOPUP</option>
                  </select>
                </div>
                
                <div className="auth-field">
                  <label>Amount (₹)</label>
                  <input 
                    type="number" 
                    className="auth-input" 
                    required 
                    min="1" 
                    placeholder="e.g. 5000" 
                    value={txnForm.amount}
                    onChange={e => setTxnForm({...txnForm, amount: e.target.value})}
                  />
                </div>
                
                <div className="auth-field form-full">
                  <label>Counterparty Name</label>
                  <input 
                    type="text" 
                    className="auth-input" 
                    required 
                    placeholder="e.g. HDFC Credit Card, Employer Payroll" 
                    value={txnForm.counterparty}
                    onChange={e => setTxnForm({...txnForm, counterparty: e.target.value})}
                  />
                </div>
              </div>
              
              <div className="form-actions">
                <button type="button" className="btn" onClick={() => setShowTxnModal(false)}>Cancel</button>
                <button type="submit" className="btn primary" disabled={modalFormLoading}>
                  {modalFormLoading ? 'Logging...' : 'Log Transaction'}
                </button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
